      `;

      const searchInput = document.getElementById("searchInput");
      const stageFilter = document.getElementById("stageFilter");
      const statusFilter = document.getElementById("statusFilter");
      const packageFilter = document.getElementById("packageFilter");
      const sortFilter = document.getElementById("sortFilter");
      const resetFiltersButton = document.getElementById("resetFiltersButton");
      const deleteSelectedProjectsButton = document.getElementById("deleteSelectedProjectsButton");
      const selectedProjectsCount = document.getElementById("selectedProjectsCount");
      const rowsEl = document.getElementById("projectRows");
      sortFilter.value = state.preferences.projectsSort;

      function updateSelectionControls() {
        const selectedCount = state.selectedProjectIds.size;
        selectedProjectsCount.textContent = `已选择 ${selectedCount} 个项目`;
        deleteSelectedProjectsButton.disabled = selectedCount === 0;
      }

      function renderRows() {
        const knownIds = new Set(state.projects.map((project) => project.id));
        state.selectedProjectIds = new Set(
          [...state.selectedProjectIds].filter((projectId) => knownIds.has(projectId))
        );
        updateSelectionControls();

        const searchValue = searchInput.value.trim().toLowerCase();
        const stageValue = stageFilter.value;
        const statusValue = statusFilter.value;
        const packageValue = packageFilter.value;
        const sortValue = sortFilter.value;
        const filtered = state.projects.filter((project) => {
          const matchSearch = !searchValue || project.name.toLowerCase().includes(searchValue) || project.customer.toLowerCase().includes(searchValue);
          const matchStage = !stageValue || project.currentStage === stageValue;
          const matchStatus = !statusValue || project.status === statusValue;
          const matchPackage = !packageValue || project.packageStatus === packageValue;
          return matchSearch && matchStage && matchStatus && matchPackage;
        }).slice();

        filtered.sort((left, right) => {
          if (sortValue === "amountDesc") {
            return right.amount - left.amount;
          }
          if (sortValue === "progressDesc") {
            return right.progress - left.progress;
          }
          return String(left.plannedDeliveryDate).localeCompare(String(right.plannedDeliveryDate));
        });

        if (!filtered.length) {
          rowsEl.innerHTML = `
            <div class="empty-state">
              <h3>没有匹配项目</h3>
              <p>请调整检索条件，或先创建新的项目记录。</p>
            </div>
          `;
          return;
        }

        rowsEl.innerHTML = filtered.map((project) => `
          <div class="table-row" data-id="${project.id}">
            <div class="project-select-cell">
              <input
                class="project-select"
                type="checkbox"
                aria-label="选择 ${escapeHtml(project.name)}"
                data-project-select="${escapeHtml(project.id)}"
                ${state.selectedProjectIds.has(project.id) ? "checked" : ""}
              >
            </div>
            <div>
              <strong>${escapeHtml(project.name)}</strong>
              <div class="table-sub">${escapeHtml(project.id)}</div>
            </div>
            <div>${escapeHtml(project.customer)}</div>
            <div>${escapeHtml(project.currentStage)}</div>
            <div class="progress-cell">
              <div class="progress-track"><div class="progress-fill" style="width:${project.progress}%"></div></div>
              <span>${project.progress}%</span>
            </div>
            <div>￥${project.amount} 万</div>
            <div>${escapeHtml(project.plannedDeliveryDate)}</div>
            <div><span class="${getTagClass(project.packageStatus)}">${escapeHtml(project.packageStatus)}</span></div>
          </div>
        `).join("");

        rowsEl.querySelectorAll(".table-row").forEach((row) => {
          row.addEventListener("click", () => navigateTo("workspace", row.dataset.id));
        });
        rowsEl.querySelectorAll(".project-select").forEach((checkbox) => {
          checkbox.addEventListener("click", (event) => event.stopPropagation());
          checkbox.addEventListener("change", () => {
            const projectId = checkbox.dataset.projectSelect;
            if (checkbox.checked) {
              state.selectedProjectIds.add(projectId);
            } else {
              state.selectedProjectIds.delete(projectId);
            }
            updateSelectionControls();
          });
        });
      }

      [searchInput, stageFilter, statusFilter, packageFilter, sortFilter].forEach((element) => {
        element.addEventListener("input", renderRows);
        element.addEventListener("change", renderRows);
      });

      resetFiltersButton.addEventListener("click", () => {
        searchInput.value = "";
        stageFilter.value = "";
        statusFilter.value = "";
        packageFilter.value = "";
        sortFilter.value = state.preferences.projectsSort;
        renderRows();
      });

      deleteSelectedProjectsButton.addEventListener("click", async () => {
        const selectedIds = [...state.selectedProjectIds];
        if (!selectedIds.length) {
          return;
        }
        const confirmed = window.confirm(`确定删除选中的 ${selectedIds.length} 个项目吗？此操作不可恢复。`);
        if (!confirmed) {
          return;
        }

        setActionLoading(deleteSelectedProjectsButton, true, "删除中...");
        try {
          const data = await deleteJson("/api/projects", { ids: selectedIds });
          const deletedIds = Array.isArray(data.deletedIds) ? data.deletedIds : selectedIds;
          if (Array.isArray(data.projects)) {
            state.projects = data.projects;
          }
          removeProjectsFromState(deletedIds);
          await loadDashboardData();
          showToast(`已删除 ${deletedIds.length} 个项目`, "success");
          renderProjectsPage();
        } catch (error) {
          showToast(`删除失败：${error.message}`, "error");
        } finally {
          setActionLoading(deleteSelectedProjectsButton, false, "删除中...");
        }
      });

      renderRows();
    }

    function bindProjectDetailEvents() {
      document.getElementById("detailEditForm")?.addEventListener("submit", saveProjectDetail);
      document.getElementById("packageRecordForm")?.addEventListener("submit", savePackageRecord);

        select.addEventListener("change", () => {
          updateChecklistStatus(select.dataset.checkName, select.value, null);
        });
      });
    }

    function renderProjectDetailPage() {
      navigateTo("workspace", state.projectDetail?.id || currentProjectId, { tab: "overview" });
    }

    function renderRequirementAnalysis() {
      const task = state.activeRequirementTask;
      const activeDocument = getRequirementDocument(task);
      const markdown = getRequirementMarkdown(task);
      const isRequirementProcessing = task?.status === "processing";
      const previousDocumentVersion = getPreviousRequirementVersion(activeDocument);
      const canEditDocument = Boolean(activeDocument)
        && (state.requirementActiveTab === "analysis" || state.requirementActiveTab === "plan")
        && !state.requirementStream
        && !isRequirementProcessing;
      const isEditingDocument = state.requirementEditMode && canEditDocument;
      const canHighlightChanges = state.requirementActiveTab === "plan" && Boolean(previousDocumentVersion) && !isEditingDocument;
      const isRequirementMessageProcessing = Boolean(task?.optimizationPending);
      let markdownPreview;
      if (state.requirementStream && state.requirementActiveTab === "thinking") {
        markdownPreview = renderMarkdownPreview(state.requirementStream.reasoning || "_小P 正在思考..._");
      } else if (state.requirementStream && state.requirementActiveTab === state.requirementStream.target) {
        markdownPreview = renderMarkdownPreview(state.requirementStream.content || "_小P 正在生成..._");
      } else if (canHighlightChanges && state.requirementHighlightChanges) {
        markdownPreview = renderMarkdownDiffPreview(markdown, previousDocumentVersion.content);
      } else {
        markdownPreview = renderMarkdownPreview(markdown);
      }
      if (state.requirementActiveTab === "plan" && !isEditingDocument && !state.requirementStream) {
        markdownPreview += renderRequirementSpecBlock(task);
      }
      const tabs = [
        { id: "thinking", label: "思考过程" },
        { id: "analysis", label: "解析结果" },
        { id: "plan", label: "实施方案" }
      ];

      getRenderRoot().innerHTML = `
        ${state.inWorkspace && state.workspaceTab === "plan" ? renderPlanSubsteps() : ""}
        ${state.inWorkspace ? "" : `<div class="requirement-page-header">${renderRequirementHeader()}</div>`}
        <section class="requirement-workspace">
          <aside class="page-card requirement-chat">
            <div class="requirement-chat-panel">
              <div>
                <div class="nav-title">小P 对话</div>
                <h2>需求方案助手</h2>
              </div>

              <div class="chat-stream" id="requirementChatStream">
                <form class="upload-drop" id="requirementUploadForm">
                  <strong>上传需求文档</strong>
                  <div class="requirement-upload-row">
                    <input id="requirementFileInput" name="requirementFile" type="file" accept=".pdf,.doc,.docx,.txt,.md,text/plain,text/markdown,application/pdf">
                    <button class="button-primary" type="submit" ${isRequirementProcessing ? "disabled" : ""}>${isRequirementProcessing ? "解析中..." : "开始解析"}</button>
                    ${isRequirementProcessing ? `<button class="button-secondary" type="button" id="requirementAbortButton">终止</button>` : ""}
                  </div>
                </form>
                ${renderRequirementConversation(task)}
              </div>

              <form id="requirementChatForm">
                <div class="model-select-row">
                  <label class="helper-text" for="requirementModelSelect">模型</label>
                  <select class="version-select" id="requirementModelSelect">
                    <option value="gpt-5.5-medium-fast" ${state.requirementModel === "gpt-5.5-medium-fast" ? "selected" : ""}>gpt-5.5-medium-fast</option>
                    <option value="deepseek" ${state.requirementModel === "deepseek" ? "selected" : ""}>deepseek</option>
                  </select>
                </div>
                <div class="chat-input-row">
                  <input id="requirementMessageInput" placeholder="继续输入优化要求..." ${isRequirementMessageProcessing ? "disabled" : ""}>
                  <button class="button-secondary" type="submit" ${isRequirementMessageProcessing ? "disabled" : ""}>${isRequirementMessageProcessing ? "小P处理中..." : "发送"}</button>
                </div>
              </form>
            </div>
          </aside>

          <main class="page-card requirement-results">
            <div class="page-header page-header--split">
              <div>
                <h2>工作区</h2>
                <p class="helper-text">当前查看：${state.requirementActiveTab === "analysis" ? "解析结果" : state.requirementActiveTab === "plan" ? "实施方案" : "思考过程"}${activeDocument ? ` / ${escapeHtml((activeDocument.versions || []).find((version) => version.id === activeDocument.currentVersionId)?.name || "")}` : ""}</p>
              </div>
              <div class="status-group">
                ${activeDocument ? `<select class="version-select" id="requirementVersionSelect" ${isEditingDocument ? "disabled" : ""}>${renderRequirementVersionOptions(activeDocument)}</select>` : ""}
                ${canHighlightChanges ? `<button class="button-secondary" type="button" id="toggleRequirementDiffButton">${state.requirementHighlightChanges ? "正常预览" : "高亮修改"}</button>` : ""}
                ${isEditingDocument
                  ? `<button class="button-primary" type="button" id="saveRequirementVersionButton">保存新版本</button>
                     <button class="button-secondary" type="button" id="cancelRequirementEditButton">取消</button>`
                  : (canEditDocument ? `<button class="button-secondary" type="button" id="editRequirementButton">编辑</button>` : "")}
                <select class="version-select" id="requirementExportFormat" ${isEditingDocument ? "disabled" : ""}>
                  <option value="md">Markdown (.md)</option>
                  <option value="docx">Word (.docx)</option>
                  <option value="pdf">PDF (.pdf)</option>
                </select>
                <button class="button-primary" type="button" id="exportRequirementMarkdownButton" ${isEditingDocument ? "disabled" : ""}>导出当前</button>
                ${task?.documents?.plan ? `<button class="button-primary" type="button" id="enterExecutionButton">进入建模</button>` : ""}
              </div>
            </div>

            <div class="requirement-result-tabs">
              ${tabs.map((tab) => `
                <button class="requirement-tab ${state.requirementActiveTab === tab.id ? "active" : ""}" type="button" data-requirement-tab="${tab.id}">
                  ${tab.label}
                </button>
              `).join("")}
            </div>

            ${isEditingDocument
              ? `<textarea class="markdown-editor" id="requirementEditArea" spellcheck="false">${escapeHtml(markdown)}</textarea>`
              : `<div class="markdown-preview" id="requirementMarkdownPreview">${markdownPreview}</div>`}
          </main>
        </section>
      `;

      document.getElementById("requirementUploadForm")?.addEventListener("submit", createRequirementTask);
      document.getElementById("requirementAbortButton")?.addEventListener("click", cancelRequirementProcessing);
      document.getElementById("requirementChatForm")?.addEventListener("submit", sendRequirementMessage);
      document.getElementById("exportRequirementMarkdownButton")?.addEventListener("click", exportCurrentRequirementDocument);
      document.getElementById("editRequirementButton")?.addEventListener("click", () => {
        state.requirementEditMode = true;
        state.requirementHighlightChanges = false;
        renderRequirementAnalysis();
        document.getElementById("requirementEditArea")?.focus();
      });
      document.getElementById("cancelRequirementEditButton")?.addEventListener("click", () => {
        state.requirementEditMode = false;
        renderRequirementAnalysis();
      });
      document.getElementById("saveRequirementVersionButton")?.addEventListener("click", saveRequirementEditedVersion);
      document.getElementById("toggleRequirementDiffButton")?.addEventListener("click", () => {
        state.requirementHighlightChanges = !state.requirementHighlightChanges;
        renderRequirementAnalysis();
      });
      document.getElementById("requirementVersionSelect")?.addEventListener("change", (event) => {
        if (!activeDocument) {
          return;
        }
        const version = (activeDocument.versions || []).find((item) => item.id === event.target.value);
        if (version) {
          activeDocument.currentVersionId = version.id;
          activeDocument.content = version.content;
          renderRequirementAnalysis();
        }
      });
      document.querySelectorAll("[data-requirement-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          state.requirementActiveTab = button.dataset.requirementTab;
          state.requirementEditMode = false;
          renderRequirementAnalysis();
        });
      });
      document.getElementById("requirementModelSelect")?.addEventListener("change", (event) => {
        state.requirementModel = event.target.value;
      });
      document.getElementById("enterExecutionButton")?.addEventListener("click", enterProjectExecution);
    }

    async function enterProjectExecution() {
      const task = state.activeRequirementTask;
      if (!task?.documents?.plan) {
        showToast("请先完成实施方案", "error");
        return;
      }
      if (state.inWorkspace) {
        switchWorkspaceTab("modeling");
        return;
      }
      try {
        await postJson("/api/executions", { requirementTaskId: task.id });
        const projectId = task.projectId || state.projectDetail?.id || currentProjectId;
        navigateTo("workspace", projectId, { tab: "modeling" });
      } catch (error) {
        showToast(`进入建模失败：${error.message}`, "error");
      }
    }

    let molstarViewer = null;
    let molstarLoadToken = 0;

    async function loadExecutionData(taskId) {
      try {
        if (taskId) {
          const created = await postJson("/api/executions", { requirementTaskId: taskId });
          state.activeExecution = created.execution || null;
        } else {
          const data = await fetchJson("/api/executions");
          const list = Array.isArray(data.executions) ? data.executions : [];
          state.activeExecution = list[0] || null;
        }
        state.apiOnline = true;
      } catch (error) {
        state.activeExecution = null;
      }
      state.executionStructureView = null;
      state.executionSpecLoading = false;
      state.executionSpecAttempted = null;
      const requirementTaskId = state.activeExecution?.requirementTaskId;
      if (requirementTaskId) {
        try {
          const data = await fetchJson(`/api/requirement-tasks/${requirementTaskId}`);
          state.executionRequirement = data.task || null;
        } catch (error) {
          state.executionRequirement = null;
        }
      }
    }

    // 建模规划抽取是较慢的大模型调用，绝不能阻塞首屏渲染（否则进入页面会“黑屏”等待）。
    // 这里在页面渲染后异步触发，完成后再重渲染；每个需求任务只自动尝试一次，避免失败时死循环。
    function maybeGenerateExecutionSpec() {
      const task = state.executionRequirement;
      const requirementTaskId = state.activeExecution?.requirementTaskId;
      if (!requirementTaskId || !task?.documents?.plan) {
        return;
      }
      const spec = task.documents.modelingSpec;
      if (spec && spec.planVersionId === task.documents.plan.currentVersionId) {
        return;
      }
      if (state.executionSpecLoading || state.executionSpecAttempted === requirementTaskId) {
        return;
      }
      ensureExecutionModelingSpec(requirementTaskId);
    }

    async function ensureExecutionModelingSpec(requirementTaskId) {
      state.executionSpecLoading = true;
      state.executionSpecAttempted = requirementTaskId;
      renderExecutionPage();
      try {
        const data = await postJson(`/api/requirement-tasks/${requirementTaskId}/modeling-spec`, { model: state.executionModel });
        if (data.task) {
          state.executionRequirement = data.task;
        }
      } catch (error) {
        // 抽取建模规划失败不阻塞项目执行
      } finally {
        state.executionSpecLoading = false;
        renderExecutionPage();
      }
    }

    function executionStatusLabel(status) {
      return ({ pending: "待开始", running: "运行中", in_progress: "进行中", completed: "已完成", failed: "失败", locked: "未解锁" })[status] || "待开始";
    }

    function molstarFormat(format) {
      const map = { pdb: "pdb", xyz: "xyz", mol: "mol", sdf: "sdf", mol2: "mol2", gro: "gro", cif: "mmcif", mmcif: "mmcif" };
      return map[String(format || "").toLowerCase()] || "pdb";
    }

    function stripStructureBlocks(text) {
      return String(text || "")
        .replace(/```(pdb|xyz|mol2|sdf|mol|gro|cif|mmcif)[\s\S]*?```/gi, "\n（结构已在右侧 Mol* 视图展示）\n")
        .replace(/```(pdb|xyz|mol2|sdf|mol|gro|cif|mmcif)[\s\S]*$/i, "\n（正在生成结构...）")
        .trim();
    }

    function getExecutionDocumentMarkdown(tab) {
      const requirement = state.executionRequirement;
      if (!requirement) {
        return "# 暂无关联需求内容\n\n未能加载到该执行关联的需求方案。";
      }
      const document = tab === "plan" ? requirement.documents?.plan : requirement.documents?.analysis;
      if (document?.content) {
        return document.content;
      }
      return tab === "plan" ? "# 暂无实施方案" : "# 暂无解析结果";
    }

    function getComputationSpec() {
      return state.executionRequirement?.documents?.computationSpec
        || state.activeRequirementTask?.documents?.computationSpec
        || null;
    }

    function isExecutionSystemReady(execution) {
      return Boolean(execution?.modules?.modeling?.system?.content || execution?.modules?.modeling?.system?.atomCount || state.workspaceFlags?.hasSystem);
    }

    function currentExecutionHasSystem() {
      const exec = state.activeExecution || state.workspace?.execution;
      return Boolean(state.workspaceFlags?.hasSystem || exec?.modules?.modeling?.system?.content || exec?.modules?.modeling?.system?.atomCount || isExecutionSystemReady(exec));
    }

    function modelingStatusForExecution(execution) {
      return isExecutionSystemReady(execution) ? "completed" : (execution?.modules?.modeling?.status || "pending");
    }

    function getExecutionComputationDocument(execution) {
      const spec = getComputationSpec();
      const stepId = state.computationActiveStep;
      const step = (spec?.workflowSteps || []).find((s) => s.id === stepId) || (spec?.workflowSteps || [])[0];
      return step?.executionDoc || "";
    }

    function renderPlanSubsteps() {
      const active = state.planSubTab || "analysis";
      const hasAnalysis = Boolean(state.activeRequirementTask?.documents?.analysis);
      const hasPlan = Boolean(state.activeRequirementTask?.documents?.plan);
      return `
        <div class="plan-substeps">
          <button class="plan-substep ${active === "analysis" ? "active" : ""} ${hasAnalysis ? "done" : ""}" type="button" data-plan-sub="analysis">
            <span class="step-num">1</span>需求解析
          </button>
          <button class="plan-substep ${active === "plan" ? "active" : ""} ${hasPlan ? "done" : ""}" type="button" data-plan-sub="plan">
            <span class="step-num">2</span>方案确认
          </button>
        </div>`;
    }

    function renderComputationStepTimeline(spec) {
      const steps = spec?.workflowSteps || [];
      if (!steps.length) {
        return `<div class="empty-state"><h3>尚无计算流程</h3><p>建模完成后点击「细化全部参数」从方案生成步骤。</p></div>`;
      }
      const module = getComputationModule(state.activeExecution);
      const hasActiveStep = steps.some((step) => step.id === state.computationActiveStep);
      const currentStepId = steps.some((step) => step.id === module.currentStepId) ? module.currentStepId : "";
      const firstRunStepId = steps.find((step) => module.runs?.[step.id])?.id || "";
      const activeId = hasActiveStep
        ? state.computationActiveStep
        : currentStepId || firstRunStepId || steps.find((s) => s.status !== "completed")?.id || steps[0]?.id;
      state.computationActiveStep = activeId;
      return steps.map((step) => {
        const status = step.status || "pending";
        const statusClass = status === "completed"
          ? "done"
          : status === "failed"
            ? "failed"
            : ["running", "in_progress"].includes(status)
              ? "running"
              : "";
        return `
        <button class="step-item ${statusClass} ${step.id === activeId ? "active" : ""}" type="button" data-computation-step="${escapeHtml(step.id)}">
          <span class="step-name">${escapeHtml(step.name)}</span>
          <span class="step-meta">${escapeHtml(step.software || spec.software?.[0] || "")} · ${escapeHtml(step.phase || "")} · ${executionStatusLabel(status)}</span>
        </button>`;
      }).join("");
    }

    function renderStepUsedSkills(step) {
      const skills = step.usedSkills || [];
      if (!skills.length) return "";
      return `
        <div class="used-skills-card">
          <div class="used-skills-title">使用的 Skills</div>
          ${skills.map((skill) => {
            const scripts = skill.scripts || [];
            return `
              <div class="used-skill-item">
                <div><span class="used-skill-name">${escapeHtml(skill.name || skill.id || "未命名 Skill")}</span>${skill.id ? ` <span class="tag">${escapeHtml(skill.id)}</span>` : ""}</div>
                ${skill.reason ? `<div>${escapeHtml(skill.reason)}</div>` : ""}
                ${scripts.length ? `<div>${scripts.map((script) => `<div class="used-skill-script">${escapeHtml(script)}</div>`).join("")}</div>` : ""}
              </div>`;
          }).join("")}
        </div>`;
    }

    function getComputationModule(execution) {
      return execution?.modules?.computation || {};
    }

    function getComputationRunnerForStep(execution, step) {
      const stepId = step?.id || "";
      const module = getComputationModule(execution);
      return state.computationRunnerSelections[stepId]
        || module.runnerSelections?.[stepId]
        || step?.runner
        || state.computationDefaultRunner
        || "local";
    }

    function renderRunnerOptions(selected) {
      return `
        <option value="local" ${selected === "local" ? "selected" : ""}>cursor-cli 本地运行</option>
        <option value="bohrium" ${selected === "bohrium" ? "selected" : ""}>Bohrium 提交</option>`;
    }

    function artifactUrl(execution, artifact) {
      return `${apiBaseUrl}/api/executions/${encodeURIComponent(execution.id)}/computation/artifacts/${encodeURIComponent(artifact.id)}`;
    }

    function buildPendingComputationRun(step, runner, mode = "single") {
      const runnerText = runner === "bohrium" ? "Bohrium" : "cursor-cli";
      return {
        stepId: step?.id || "",
        stepName: step?.name || step?.id || "计算步骤",
        runner,
        status: "running",
        summary: `${runnerText} 运行中：${step?.name || step?.id || "计算步骤"}`,
        logs: [
          mode === "all" ? "已加入顺序运行队列。" : "已提交当前步骤运行请求。",
          runner === "bohrium" ? "正在准备 Bohrium 提交..." : "正在调用 cursor-cli 生成本地运行结果...",
          "后端返回后会在这里展示完整日志和生成文件。"
        ],
        artifacts: [],
        startedAt: new Date().toISOString()
      };
    }

    function renderComputationRunResult(execution, step) {
      const module = getComputationModule(execution);
      const run = state.computationPendingRuns[step?.id || ""] || module.runs?.[step?.id || ""];
      if (!run) {
        return `<div class="computation-run-card"><div class="helper-text">尚未运行本步骤。</div></div>`;
      }
      const artifacts = run.artifacts || [];
      return `
        <div class="computation-run-card">
          <div><strong>运行状态：</strong>${executionStatusLabel(run.status)} ${run.runner ? `<span class="tag">${escapeHtml(run.runner)}</span>` : ""}</div>
          ${run.summary ? `<div>${escapeHtml(run.summary)}</div>` : ""}
          ${(run.logs || []).length ? `<div class="computation-log">${escapeHtml((run.logs || []).join("\n"))}</div>` : ""}
          <div class="artifact-list">
            ${artifacts.length ? artifacts.map((artifact) => `
              <div class="artifact-item">
                <span>${escapeHtml(artifact.name || artifact.id)} <span class="tag">${escapeHtml(artifact.kind || "file")}</span></span>
                <a class="button-secondary" href="${artifactUrl(execution, artifact)}" target="_blank" rel="noopener">打开</a>
              </div>
            `).join("") : `<span class="helper-text">暂无生成文件。</span>`}
          </div>
        </div>`;
    }

    function renderModelingToComputationAction(execution) {
      if (!isExecutionSystemReady(execution)) {
        return "";
      }
      const modelInput = execution?.modules?.computation?.modelInput;
      const system = execution?.modules?.modeling?.system || {};
      const filePath = modelInput?.filePath || system.filePath || "完整体系结构";
      return `
        <div class="auto-modeling-card">
          <div class="pane-head" style="border:0;padding:0;">计算输入已就绪</div>
          <p class="helper-text">将完整体系作为模拟计算第一步输入：${escapeHtml(filePath)}${modelInput?.atomCount ? ` · ${escapeHtml(modelInput.atomCount)} atoms` : ""}</p>
          <button class="button-primary" type="button" id="enterComputationButton" ${state.computationPreparing ? "disabled" : ""}>${state.computationPreparing ? "进入中..." : "进入模拟计算"}</button>
        </div>`;
    }

    function renderComputationModelInput(execution) {
      const modelInput = execution?.modules?.computation?.modelInput;
      if (!modelInput?.filePath) {
        return "";
      }
      const moleculeCount = (modelInput.molecules || []).length;
      return `

        content: molecule.content || state.structureCache[molecule.id]?.content,
        kind: "molecule",
        atomCount: molecule.atomCount

      const system = modeling.system;
      if (system?.content || state.structureCache.system?.content) {
        list.push({

          content: system?.content || state.structureCache.system?.content,

    async function loadStructureAsBallAndStick(viewer, structure) {
      const format = molstarFormat(structure.format);
      const plugin = viewer.plugin;
      // 用底层 builders 显式指定球棍模型；默认预设对完整体系可能选成线条/其他表示。
      if (plugin?.builders?.structure) {
        try {
          await plugin.clear();
          const data = await plugin.builders.data.rawData({ data: structure.content, label: structure.name || "structure" });
          const trajectory = await plugin.builders.structure.parseTrajectory(data, format);
          const model = await plugin.builders.structure.createModel(trajectory);
          const struct = await plugin.builders.structure.createStructure(model);
          const component = await plugin.builders.structure.tryCreateComponentStatic(struct, "all");
          if (component) {
            await plugin.builders.structure.representation.addRepresentation(component, {
              type: "ball-and-stick",
              color: "element-symbol",
              // 默认 element-symbol 主题会把碳按链着色以区分分子；这里改为按元素统一着色（碳=灰）。
              colorParams: { carbonColor: { name: "element-symbol", params: {} } },
            });
          }
          // 完整体系（含 CRYST1 晶胞）额外画出模拟盒子。
          if (structure.kind === "system") {
            try {
              await plugin.builders.structure.tryCreateUnitcell(model, undefined, { isHidden: false });
            } catch (cellError) {
              // 无晶胞信息时忽略
            }
          }
          plugin.canvas3d?.requestCameraReset?.();
          return;
        } catch (error) {
          // 退回到默认加载方式
        }
      }
      await viewer.loadStructureFromData(structure.content, format);
    }

    async function initExecutionViewer() {
      const container = document.getElementById("molstarViewer");
      if (!container) {
        return;
      }
      if (!window.molstar || !window.molstar.Viewer) {
        container.innerHTML = `<div class="execution-viewer-empty">Mol* 加载失败，请检查网络后刷新页面。</div>`;
        return;
      }
      // 每次进入都自增 token；后续 await 之后若 token 已变化（发生了新的渲染/切换），
      // 立即放弃本次加载，避免旧结构覆盖新选择导致"看起来都一样"。
      const token = ++molstarLoadToken;
      disposeMolstarViewer();
      // 等待一帧，确保容器已完成布局（拿到非零尺寸）再创建 Mol*，否则画布会以
      // 0×0 初始化导致渲染为空。
      await new Promise((resolve) => requestAnimationFrame(() => resolve()));
      if (token !== molstarLoadToken) {
        return;
      }
      try {
        const viewer = await window.molstar.Viewer.create(container, {
          layoutIsExpanded: false,
          layoutShowControls: false,
          layoutShowSequence: false,
          layoutShowLog: false,
          layoutShowLeftPanel: false,
          viewportShowExpand: true,
          viewportShowSelectionMode: false,
          viewportShowAnimation: false
        });
        if (token !== molstarLoadToken) {
          try { viewer.dispose?.(); } catch (_) { /* noop */ }
          return;
        }
        molstarViewer = viewer;
        const structure = getActiveExecutionStructure(state.activeExecution);
        if (structure?.content) {
          await loadStructureAsBallAndStick(viewer, structure);
          if (token !== molstarLoadToken) {
            return;
          }
          try {
            viewer.handleResize?.();
            viewer.plugin?.canvas3d?.requestCameraReset?.();
          } catch (resetError) {
            // 相机/尺寸调整失败不影响主流程
          }
        }
      } catch (error) {
        container.innerHTML = `<div class="execution-viewer-empty">结构渲染失败：${escapeHtml(error.message || String(error))}</div>`;
      }
    }

    async function startAutoModeling() {
      const execution = state.activeExecution;
      if (!execution) {
        showToast("请先从需求解析进入项目执行", "error");
        return;
      }
      state.executionAutoRunning = true;
      // 清空上一轮对话历史，从干净状态重新建模。
      state.activeExecution = { ...execution, conversation: [] };
      state.executionStream = { active: true, content: "", reasoning: "", label: "准备自动建模..." };
      renderExecutionPage();
      try {
        let updated = execution;
        await streamRequirement(`/api/executions/${execution.id}/auto-modeling`, { model: state.executionModel }, async (streamEvent) => {
          if (streamEvent.type === "step") {
            if (streamEvent.execution) {
              state.activeExecution = streamEvent.execution;
            }
            state.executionStream = { active: true, content: "", reasoning: "", label: streamEvent.label || "建模中..." };
            updateExecutionStreamingView();
          } else if (streamEvent.type === "content") {
            state.executionStream.content += streamEvent.text;
            updateExecutionStreamingView();
          } else if (streamEvent.type === "reasoning") {
            state.executionStream.reasoning += streamEvent.text;
          } else if (streamEvent.type === "progress") {
            await refreshFullExecution(execution.id);
            updated = state.activeExecution;
            state.executionStream = null;
            const structures = getExecutionStructures(updated);
            if (structures.length) {
              state.executionStructureView = structures[structures.length - 1].id;
            }
            renderExecutionPage();
          } else if (streamEvent.type === "done") {
            await refreshFullExecution(execution.id);
            updated = state.activeExecution;
          } else if (streamEvent.type === "error") {
            throw new Error(streamEvent.error);
          }
        });
        state.executionStream = null;
        state.executionAutoRunning = false;
        await refreshFullExecution(execution.id);
        state.activeExecution = state.activeExecution || updated;
        updated = state.activeExecution;
        const structures = getExecutionStructures(updated);
        if (updated?.modules?.modeling?.system?.content) {
          state.executionStructureView = "system";
          state.workspaceFlags = { ...(state.workspaceFlags || {}), hasSystem: true };
        } else if (structures.length) {
          state.executionStructureView = structures[structures.length - 1].id;
        }
        state.executionActiveTab = "structure";
        renderExecutionPage();
        showToast("自动建模完成", "success");
      } catch (error) {
        state.executionStream = null;
        state.executionAutoRunning = false;
        renderExecutionPage();
        showToast(`自动建模失败：${error.message}`, "error");
      }
    }

    async function enterComputationFromModeling() {
      const execution = state.activeExecution;
      if (!execution) {
        showToast("请先进入建模执行", "error");
        return;
      }
      if (!isExecutionSystemReady(execution)) {
        showToast("请先完成建模并组装完整体系", "error");
        return;
      }
      state.computationPreparing = true;
      renderExecutionPage();
      try {
        const payload = await postJson(`/api/executions/${execution.id}/computation/prepare`, {});
        if (payload.execution) {
          state.activeExecution = payload.execution;
          if (state.workspace) state.workspace.execution = payload.execution;
        }
        if (payload.project) {
          state.projectDetail = payload.project;
          if (state.workspace) state.workspace.project = payload.project;
        }
        state.workspaceFlags = { ...(state.workspaceFlags || {}), hasSystem: true };
        state.computationPreparing = false;
        showToast("已带入建模体系，进入模拟计算", "success");
        await switchWorkspaceTab("computation");
      } catch (error) {
        state.computationPreparing = false;
        renderExecutionPage();
        showToast(`进入模拟计算失败：${error.message}`, "error");
      }
    }

    async function startComputation() {
      const execution = state.activeExecution;
      if (!execution) {
        showToast("请先从需求解析进入项目执行", "error");
        return;
      }
      if (!isExecutionSystemReady(execution)) {
        showToast("请先完成建模并组装体系", "error");
        return;
      }
      if (state.executionComputationRunning || state.executionAutoRunning) {
        return;
      }
      state.executionComputationRunning = true;
      state.executionStream = { active: true, content: "", reasoning: "", label: "细化模拟计算流程..." };
      renderComputationPage();
      try {
        let updated = execution;
        await streamRequirement(`/api/executions/${execution.id}/run-computation`, { model: state.executionModel }, async (streamEvent) => {
          if (streamEvent.type === "step") {
            if (streamEvent.execution) {
              state.activeExecution = streamEvent.execution;
            }
            state.executionStream = { active: true, content: "", reasoning: "", label: streamEvent.label || "生成中..." };
            updateComputationStreamingView();
          } else if (streamEvent.type === "content") {
            state.executionStream.content += streamEvent.text;
            updateComputationStreamingView();
          } else if (streamEvent.type === "reasoning") {
            state.executionStream.reasoning += streamEvent.text;
          } else if (streamEvent.type === "done") {
            if (streamEvent.computationSpec && state.activeRequirementTask) {
              state.activeRequirementTask.documents = state.activeRequirementTask.documents || {};
              state.activeRequirementTask.documents.computationSpec = streamEvent.computationSpec;
            }
            await refreshFullExecution(execution.id);
            updated = state.activeExecution;
          } else if (streamEvent.type === "error") {
            throw new Error(streamEvent.error);
          }
        });
        state.executionStream = null;
        state.executionComputationRunning = false;
        state.activeExecution = updated;
        renderComputationPage();
        showToast("模拟计算流程已细化", "success");
      } catch (error) {
        state.executionStream = null;
        state.executionComputationRunning = false;
        renderComputationPage();
        showToast(`模拟计算失败：${error.message}`, "error");
      }
    }

    function applyComputationRunPayload(payload) {
      if (payload.execution) {
        state.activeExecution = payload.execution;
      }
      if (payload.computationSpec && state.activeRequirementTask) {
        state.activeRequirementTask.documents = state.activeRequirementTask.documents || {};
        state.activeRequirementTask.documents.computationSpec = payload.computationSpec;
      }
      if (payload.computationSpec && state.executionRequirement) {
        state.executionRequirement.documents = state.executionRequirement.documents || {};
        state.executionRequirement.documents.computationSpec = payload.computationSpec;
      }
    }

    async function runComputationStep(stepId) {
      const execution = state.activeExecution;
      if (!execution || !stepId) return;
      const spec = getComputationSpec();
      const step = (spec?.workflowSteps || []).find((item) => item.id === stepId) || { id: stepId };
      const runner = state.computationRunnerSelections[stepId]
        || execution.modules?.computation?.runnerSelections?.[stepId]
        || state.computationDefaultRunner
        || "local";
      state.computationPendingRuns[stepId] = buildPendingComputationRun(step, runner);
      state.computationRunningStepId = stepId;
      renderComputationPage();
      try {
        const payload = await postJson(`/api/executions/${execution.id}/computation/steps/${encodeURIComponent(stepId)}/run`, { runner });
        applyComputationRunPayload(payload);
        showToast("计算步骤运行完成", payload.run?.status === "failed" ? "error" : "success");
      } catch (error) {
        await refreshFullExecution(execution.id);
        showToast(`计算步骤运行失败：${error.message}`, "error");
      } finally {
        delete state.computationPendingRuns[stepId];
        state.computationRunningStepId = null;
        renderComputationPage();
      }
    }

    async function terminateComputationStep(stepId) {
      const execution = state.activeExecution;
      if (!execution || !stepId || state.computationTerminatingStepId) return;
      state.computationTerminatingStepId = stepId;
      renderComputationPage();
      try {
        const payload = await postJson(`/api/executions/${execution.id}/computation/steps/${encodeURIComponent(stepId)}/terminate`, {});
        applyComputationRunPayload(payload);
        showToast("已终止 Bohrium 任务", "success");
      } catch (error) {
        await refreshFullExecution(execution.id);
        showToast(`终止失败：${error.message}`, "error");
      } finally {
        state.computationTerminatingStepId = null;
        renderComputationPage();
      }
    }

    async function runAllComputationSteps() {
      const execution = state.activeExecution;
      if (!execution) return;
      const spec = getComputationSpec();
      (spec?.workflowSteps || []).forEach((step) => {
        const runner = state.computationRunnerSelections[step.id] || state.computationDefaultRunner || "local";
        state.computationPendingRuns[step.id] = buildPendingComputationRun(step, runner, "all");
      });
      state.computationRunAllRunning = true;
      renderComputationPage();
      try {
        const payload = await postJson(`/api/executions/${execution.id}/computation/run-all`, {
          defaultRunner: state.computationDefaultRunner,
          runnerOverrides: state.computationRunnerSelections
        });
        applyComputationRunPayload(payload);
        const failed = (payload.runs || []).some((run) => run.status === "failed");
        showToast(failed ? "计算流程已停止：存在失败步骤" : "计算流程运行完成", failed ? "error" : "success");
      } catch (error) {
        await refreshFullExecution(execution.id);
        showToast(`计算流程运行失败：${error.message}`, "error");
      } finally {
        state.computationPendingRuns = {};
        state.computationRunAllRunning = false;
        renderComputationPage();
      }
    }

    async function sendModelingMessage(event) {
      event.preventDefault();
      const execution = state.activeExecution;
      if (!execution) {
        showToast("请先从需求解析进入项目执行", "error");
        return;
      }
      if (state.executionAutoRunning) {
        return;
      }
      const input = document.getElementById("executionMessageInput");
      const message = String(input?.value || "").trim();
      if (!message) {
        return;
      }
      const submitButton = event.currentTarget.querySelector('button[type="submit"]');
      setActionLoading(submitButton, true, "优化中...");
      const now = new Date().toISOString();
      state.activeExecution = {
        ...execution,
        conversation: [...(execution.conversation || []), { role: "user", content: message, createdAt: now }]
      };
      state.executionStream = { active: true, content: "", reasoning: "", label: "根据反馈优化结构" };
      if (input) {
        input.value = "";
      }
      updateExecutionStreamingView();
      try {
        let updated = execution;
        await streamRequirement(`/api/executions/${execution.id}/modeling-chat`, { message, model: state.executionModel }, (streamEvent) => {
          if (streamEvent.type === "content") {
            state.executionStream.content += streamEvent.text;
            updateExecutionStreamingView();
          } else if (streamEvent.type === "reasoning") {
            state.executionStream.reasoning += streamEvent.text;
          } else if (streamEvent.type === "done") {
            updated = streamEvent.execution;
          } else if (streamEvent.type === "error") {
            throw new Error(streamEvent.error);
          }
        });
        state.executionStream = null;
        state.activeExecution = updated;
        const structures = getExecutionStructures(updated);
        if (updated?.modules?.modeling?.system?.content) {
          state.executionStructureView = "system";
        } else if (structures.length) {
          state.executionStructureView = structures[structures.length - 1].id;
        }
        state.executionActiveTab = "structure";
        renderExecutionPage();
        showToast("已根据反馈更新结构", "success");
      } catch (error) {
        state.executionStream = null;
        renderExecutionPage();
        showToast(`优化失败：${error.message}`, "error");
      } finally {
        setActionLoading(submitButton, false, "优化中...");
      }
    }

    async function ensureWorkspaceTaskDetail() {
      const summary = state.workspace?.requirementTask;
      const taskId = summary?.id || state.activeRequirementTask?.id;
      if (!taskId) return;
      if (state.activeRequirementTask?.documents) return;
      const data = await fetchJson(`/api/requirement-tasks/${taskId}`);
      state.activeRequirementTask = data.task || null;
      state.executionRequirement = data.task || null;
      if (state.workspace) state.workspace.requirementTask = data.task || summary;
    }

    async function ensureWorkspaceExecution() {
      const task = state.activeRequirementTask || state.workspace?.requirementTask;
      const taskId = task?.id;
      if (!taskId) return;
      const flags = state.workspaceFlags || {};
      const hasPlan = Boolean(
        flags.hasPlan ||
        task?.hasPlan ||
        state.activeRequirementTask?.documents?.plan ||
        task?.documents?.plan
      );
      if (!hasPlan) {
        await ensureWorkspaceTaskDetail();
      }
      const planReady = Boolean(
        flags.hasPlan ||
        state.activeRequirementTask?.hasPlan ||
        state.activeRequirementTask?.documents?.plan ||
        task?.hasPlan ||
        task?.documents?.plan
      );
      if (!planReady) return;
      if (state.workspace?.execution?.id && !state.activeExecution) {
        state.activeExecution = state.workspace.execution;
      }
      const data = await postJson("/api/executions", { requirementTaskId: taskId });
      state.activeExecution = data.execution || state.activeExecution || null;
      if (state.workspace) state.workspace.execution = state.activeExecution;
    }

    async function loadPlanDocument(part) {
      const taskId = state.activeRequirementTask?.id || state.workspace?.requirementTask?.id;
      if (!taskId) return;
      await ensureWorkspaceTaskDetail();
      const data = await fetchJson(`/api/requirement-tasks/${taskId}/documents?part=${part}`);
      const doc = data.document;
      if (!doc) return;
      state.activeRequirementTask.documents = state.activeRequirementTask.documents || {};
      state.activeRequirementTask.documents[part] = {
        ...(state.activeRequirementTask.documents[part] || {}),
        content: doc.content,
        currentVersionId: doc.currentVersionId,
        versions: doc.versions
      };
      if (part === "plan") {
        state.requirementActiveTab = "plan";
      } else {
        state.requirementActiveTab = "analysis";
      }
    }

    async function loadStructureContent(structureId) {
      const executionId = state.activeExecution?.id;
      if (!executionId || !structureId) return null;
      if (state.structureCache[structureId]) return state.structureCache[structureId];
      const data = await fetchJson(`/api/executions/${executionId}/structures/${structureId}`);
      state.structureCache[structureId] = data.structure;
      return data.structure;
    }

    function computeWorkspaceStages() {
      const ws = state.workspace || {};
      const flags = state.workspaceFlags || {};
      const project = state.projectDetail || ws.project || {};
      const task = state.activeRequirementTask || ws.requirementTask;
      const exec = state.activeExecution || ws.execution;
      const hasAnalysis = Boolean(flags.hasAnalysis || task?.hasAnalysis || task?.documents?.analysis);
      const hasPlan = Boolean(flags.hasPlan || task?.hasPlan || task?.documents?.plan);
      const hasSystem = Boolean(flags.hasSystem || exec?.modules?.modeling?.system?.atomCount || exec?.modules?.modeling?.system?.content || isExecutionSystemReady(exec));
      const spec = state.activeRequirementTask?.documents?.computationSpec || task?.documents?.computationSpec;
      const steps = spec?.workflowSteps || [];
      const computationDone = Boolean(flags.computationDone || (steps.length && steps.every((s) => s.status === "completed")));
      const delivered = ["可打包", "已打包"].includes(project.packageStatus) || project.currentStage === "交付";
      const defs = [
        { id: "立项", tab: "overview", sub: "", desc: "项目信息", done: true },
        { id: "需求解析", tab: "plan", sub: "analysis", desc: "解析报告", done: hasAnalysis },
        { id: "方案确认", tab: "plan", sub: "plan", desc: "实施方案", done: hasPlan },
        { id: "建模", tab: "modeling", sub: "", desc: "结构组装", done: hasSystem },
        { id: "模拟计算", tab: "computation", sub: "", desc: "计算流程", done: computationDone },
        { id: "交付", tab: "delivery", sub: "", desc: "清单打包", done: delivered }
      ];
      const currentIndex = defs.findIndex((stage) => !stage.done);
      return defs.map((stage, idx) => ({
        ...stage,
        state: stage.done ? "done" : (idx === currentIndex ? "current" : "pending")
      }));
    }

    function renderWorkspaceProjectOptions(currentId) {
      const projects = state.projects || [];
      return projects
        .map((project) => `<option value="${escapeHtml(project.id)}" ${project.id === currentId ? "selected" : ""}>${escapeHtml(project.name)}</option>`)
        .join("");
    }

    function renderWorkspaceProgress() {
      const stages = computeWorkspaceStages();
      return `
        <div class="workspace-progress">
          ${stages.map((stage, idx) => `
            <button class="wp-step ${stage.state}" type="button" data-workspace-step-tab="${stage.tab}" data-workspace-step-sub="${stage.sub || ""}" title="${escapeHtml(stage.desc)}">
              <span class="wp-dot">${stage.state === "done" ? "✓" : idx + 1}</span>
              <span class="wp-label">${escapeHtml(stage.id)}</span>
              <span class="wp-desc">${escapeHtml(stage.desc)}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderWorkspaceTabs(activeTab) {
      const flags = state.workspaceFlags || {};
      const hasPlan = Boolean(flags.hasPlan || state.workspace?.requirementTask?.hasPlan || state.activeRequirementTask?.documents?.plan);
      const modelingLocked = !hasPlan;

      return `
        <div class="workspace-tabs">
          ${workspaceTabDefs.map((tab) => {
            const disabled = (tab.id === "modeling" && modelingLocked) || (tab.id === "computation" && computationLocked);
            const title = tab.id === "modeling" && modelingLocked ? "需先完成方案" : (tab.id === "computation" && computationLocked ? "需先完成建模" : "");
            return `<button class="workspace-tab ${activeTab === tab.id ? "active" : ""}" type="button" data-workspace-tab="${tab.id}" ${disabled ? "disabled" : ""} title="${title}">${tab.label}</button>`;
          }).join("")}
        </div>
      `;
    }

    function describeDeliveryCountdown(dateText) {
      if (!dateText) {
        return { text: "未设置交付日期", tone: "" };
      }
      const target = new Date(`${dateText}T00:00:00`);
      if (Number.isNaN(target.getTime())) {
        return { text: "—", tone: "" };
      }
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const days = Math.round((target - today) / 86400000);
      if (days > 0) {
        return { text: `距交付还有 ${days} 天`, tone: days <= 7 ? "warn" : "" };
      }
      if (days === 0) {
        return { text: "今天交付", tone: "warn" };
      }
      return { text: `已逾期 ${Math.abs(days)} 天`, tone: "danger" };
    }

              }).join("")}

    }

    async function ensureProjectDetailLoaded() {
      const projectId = state.projectDetail?.id || state.workspace?.project?.id;
      if (!projectId) {
        return;
      }
      if (state.projectDetail?.deliveryChecklist && state.projectDetail?.packageRecords) {
        return;
      }
      await loadProjectDetailData(projectId);
    }

    async function renderWorkspaceBody(tab) {
      const ws = state.workspace || {};
      if (tab === "plan" || tab === "requirement") {
        await ensureWorkspaceTaskDetail();
        state.activeRequirementTask = state.activeRequirementTask || ws.requirementTask;
        state.executionRequirement = state.activeRequirementTask;
        const sub = state.planSubTab || "analysis";
        if (!state.activeRequirementTask?.documents?.[sub]?.content) {
          await loadPlanDocument(sub);
        } else {
          state.requirementActiveTab = sub === "plan" ? "plan" : "analysis";
        }
        renderRequirementAnalysis();
        getRenderRoot().querySelectorAll("[data-plan-sub]").forEach((button) => {
          button.addEventListener("click", async () => {
            state.planSubTab = button.dataset.planSub;
            await loadPlanDocument(state.planSubTab);
            renderWorkspaceBody("plan");
          });
        });
      } else if (tab === "modeling" || tab === "execution") {
        await ensureWorkspaceExecution();
        await ensureWorkspaceTaskDetail();
        state.executionRequirement = state.activeRequirementTask;
        if (state.activeExecution?.id) {
          await refreshFullExecution(state.activeExecution.id);
        }
        renderExecutionPage();
      } else if (tab === "computation") {
        await ensureWorkspaceExecution();
        await ensureWorkspaceTaskDetail();
        state.executionRequirement = state.activeRequirementTask;
        if (state.activeExecution?.id) {
          await refreshFullExecution(state.activeExecution.id);
        }
        const taskId = state.activeRequirementTask?.id;
        if (taskId && !getComputationSpec()) {
          try {
            const data = await fetchJson(`/api/requirement-tasks/${taskId}/specs?part=computation`);
            if (data.spec) {
              state.activeRequirementTask.documents = state.activeRequirementTask.documents || {};
              state.activeRequirementTask.documents.computationSpec = data.spec;
            }
          } catch (error) {}
        }
        renderComputationPage();
      } else if (tab === "delivery") {
        await ensureProjectDetailLoaded();
        renderWorkspaceDelivery();
      } else {
        await ensureProjectDetailLoaded();
        renderWorkspaceOverview();
      }
    }

    function renderWorkspacePage() {
      const project = state.projectDetail || state.workspace?.project;
      if (!project) {
        mainContentEl.innerHTML = `
          ${renderPageHeader("项目工作台", "未找到项目，请从项目列表选择有效项目。")}
          <div class="empty-state"><h3>项目不存在</h3><p>请返回项目列表重新选择。</p></div>
        `;
        bindGlobalUi();
        return;
      }
      const tab = state.workspaceTab;
      mainContentEl.innerHTML = `
        ${renderWorkspaceHeader(project)}
        ${renderWorkspaceTabs(tab)}
        <div id="workspaceBody"></div>
      `;
      document.querySelectorAll("[data-workspace-tab]").forEach((button) => {
        if (button.disabled) {
          return;
        }
        button.addEventListener("click", () => switchWorkspaceTab(button.dataset.workspaceTab));
      });
      document.querySelectorAll("[data-workspace-step-tab]").forEach((button) => {
        button.addEventListener("click", () => {
          const target = button.dataset.workspaceStepTab;
          const sub = button.dataset.workspaceStepSub || "";
          const hasPlan = Boolean(state.workspaceFlags?.hasPlan || state.activeRequirementTask?.documents?.plan);
          if ((target === "modeling" || target === "computation") && !hasPlan) {
            showToast("请先完成实施方案", "error");
            return;
          }
          if (sub) state.planSubTab = sub;
          switchWorkspaceTab(target === "execution" ? "modeling" : target, sub);
        });
      });
      document.getElementById("workspaceProjectSelect")?.addEventListener("change", (event) => {
        navigateTo("workspace", event.target.value);
      });
      bindGlobalUi();
      renderWorkspaceBody(tab);
    }

    async function switchWorkspaceTab(tab, planSub) {
      if (tab === "execution") tab = "modeling";
      state.workspaceTab = tab;
      if (planSub) state.planSubTab = planSub;
      try {
        const url = new URL(window.location.href);
        url.searchParams.set("tab", tab);
        window.history.replaceState({}, "", url.toString());
      } catch (error) {}
      renderWorkspacePage();
    }

    function renderCurrentPage() {
      applyPreferences();
      state.inWorkspace = currentPage === "workspace";
      renderNav();
      if (currentPage === "create") {
        renderProjectsPage();
        openCreateProjectModal();
      } else if (currentPage === "projects") {
        renderProjectsPage();
      } else if (currentPage === "workspace") {
        renderWorkspacePage();
      } else {
        renderDashboard();
      }
      bindGlobalUi();
    }

    async function resolveLegacyWorkspaceProjectId() {
      const legacyId = urlParams.get("id") || currentProjectId;
      if (legacyRoutePage === "requirements") {
        await loadRequirementTasks();
        return state.activeRequirementTask?.projectId || legacyId;
      }
      if (legacyRoutePage === "execution") {
        if (legacyId.startsWith("p-")) {
          return legacyId;
        }
        try {
          const data = await fetchJson(`/api/requirement-tasks/${legacyId}`);
          return data.task?.projectId || currentProjectId;
        } catch (error) {
          return currentProjectId;
        }
      }
      return legacyId;
    }

    async function init() {
      syncSettingsForm();
      bindCreateProjectForm();
      applyPreferences();
      let workspaceProjectId = currentProjectId;
      if (legacyRoutePage) {
        workspaceProjectId = await resolveLegacyWorkspaceProjectId();
        replaceUrlWithWorkspace(workspaceProjectId, initialWorkspaceTab);
      }
      if (currentPage === "dashboard") {
        await loadDashboardData();
      }
      if (currentPage === "dashboard" || currentPage === "projects" || currentPage === "workspace") {
        await loadProjectsData();
      }
      if (currentPage === "workspace") {
        await loadWorkspaceData(workspaceProjectId);
        const normalizedTab = initialWorkspaceTab === "requirement" ? "plan" : (initialWorkspaceTab === "execution" ? "modeling" : initialWorkspaceTab);
        state.workspaceTab = workspaceTabDefs.some((tab) => tab.id === normalizedTab) ? normalizedTab : "overview";
        if (state.workspaceTab === "modeling" || state.workspaceTab === "computation") {
          await ensureWorkspaceExecution();
        }
      }
      renderCurrentPage();
    }

    window.navigateTo = navigateTo;
    window.updateChecklistStatus = updateChecklistStatus;
    init();
  </script>
</body>
</html>
