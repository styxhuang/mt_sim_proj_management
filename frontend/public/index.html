<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2338bdf8'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-size='12' font-family='Arial,sans-serif' font-weight='700' fill='%2304111f'%3ESF%3C/text%3E%3C/svg%3E">
  <title>项目管理系统</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js/dist/html-docx.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js/dist/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/molstar@4/build/viewer/molstar.css">
  <script src="https://cdn.jsdelivr.net/npm/molstar@4/build/viewer/molstar.js"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap");

    :root {
      --bg-canvas: #020617;
      --bg-shell: rgba(8, 15, 28, 0.92);
      --bg-panel: rgba(15, 23, 42, 0.78);
      --bg-panel-strong: rgba(15, 23, 42, 0.94);
      --bg-panel-soft: rgba(15, 23, 42, 0.58);
      --line-soft: rgba(148, 163, 184, 0.12);
      --line-strong: rgba(148, 163, 184, 0.22);
      --text-strong: #f8fafc;
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --brand: #38bdf8;
      --brand-strong: #2563eb;
      --brand-soft: rgba(56, 189, 248, 0.12);
      --accent: #22c55e;
      --warn: #f59e0b;
      --danger: #f97316;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --space-1: 8px;
      --space-2: 12px;
      --space-3: 16px;
      --space-4: 20px;
      --space-5: 24px;
      --space-6: 32px;
      --shadow-panel: 0 18px 40px rgba(2, 6, 23, 0.28);
      --shadow-raised: 0 12px 24px rgba(2, 6, 23, 0.22);
      --control-height: 34px;
      --control-height-sm: 28px;
      --page-max-width: 1680px;
      --panel: var(--bg-panel);
      --line: var(--line-soft);
      --text: var(--text-strong);
      --muted: var(--text-muted);
      --shadow: var(--shadow-panel);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      font-size: 12px;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.1), transparent 24%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 20%),
        linear-gradient(180deg, var(--bg-canvas) 0%, #07111f 48%, var(--bg-canvas) 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      filter: blur(110px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: 64px;
      left: -110px;
      background: rgba(56, 189, 248, 0.12);
    }

    body::after {
      right: -110px;
      top: 240px;
      background: rgba(37, 99, 235, 0.08);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    button:hover {
      box-shadow: var(--shadow-raised);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(56, 189, 248, 0.95);
      outline-offset: 2px;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 24px;
    }

    .app {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: var(--space-4);
      min-height: calc(100vh - 48px);
    }

    .sidebar,
    .main,
    .metric-card,
    .panel-card,
    .page-card,
    .detail-card,
    .table-row,
    .summary-item,
    .reminder-item,
    .record-item,
    .check-item,
    .empty-state {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .sidebar {
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(37, 99, 235, 0.05));
      border: 1px solid rgba(56, 189, 248, 0.12);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #04111f;
      background: linear-gradient(135deg, #67e8f9, #38bdf8);
      box-shadow: 0 14px 26px rgba(56, 189, 248, 0.18);
    }

    .brand-title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .brand-sub,
    .muted,
    .helper-text,
    .table-sub,
    .empty-state p {
      color: var(--muted);
    }

    .nav-title,
    .note-title,
    .section-title span {
      font-size: 9px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .nav-group {
      display: grid;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.18);
      border: 1px solid transparent;
      text-align: left;
    }

    .nav-item.active {
      color: #ffffff;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.16), rgba(59, 130, 246, 0.1));
      border-color: rgba(56, 189, 248, 0.18);
    }

    .nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, #67e8f9, #38bdf8);
      box-shadow: 0 0 0 6px rgba(56, 189, 248, 0.08);
    }

    .side-note {
      margin-top: auto;
      padding: 18px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.44);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .side-note p {
      margin: 8px 0 0;
      font-size: 10px;
      line-height: 1.6;
    }

    .main {
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      min-width: 0;
      width: 100%;
      min-height: 100%;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .page-header--split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
    }

    .page-header-main,
    .page-header-side {
      display: grid;
      gap: var(--space-2);
    }

    .page-header-side {
      justify-items: end;
      align-content: start;
    }

    .eyebrow,
    .status-pill,
    .tag,
    .stage-chip,
    .record-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      font-size: 9px;
      border: 1px solid transparent;
    }

    .eyebrow {
      padding: 7px 12px;
      background: var(--brand-soft);
      color: #bae6fd;
      border-color: rgba(56, 189, 248, 0.16);
    }

    .eyebrow::before,
    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.9;
    }

    .page-title h1,
    .section-title h2,
    .page-card h2,
    .detail-card h3 {
      margin: 0;
    }

    .page-title h1 {
      margin-top: 9px;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .page-title p {
      margin: 6px 0 0;
      max-width: 720px;
      font-size: 12px;
      line-height: 1.65;
      color: var(--muted);
    }

    .status-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .page-toolbar {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }

    .status-pill {
      padding: 7px 11px;
      background: rgba(15, 23, 42, 0.4);
      border-color: rgba(148, 163, 184, 0.14);
      color: #cbd5e1;
    }

    .status-pill.online {
      color: #d1fae5;
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.18);
    }

    .status-pill.offline {
      color: #fde68a;
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.2);
    }

    .grid-metrics,
    .grid-charts,
    .dashboard-bottom,
    .form-grid,
    .detail-grid {
      display: grid;
      gap: 16px;
    }

    .grid-metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .grid-charts,
    .dashboard-bottom,
    .detail-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 16px;
    }

    .metric-card,
    .panel-card,
    .page-card {
      border-radius: var(--radius-lg);
      padding: 18px;
    }

    .metric-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .metric-label {
      font-size: 10px;
      color: var(--muted);
    }

    .metric-value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .metric-meta {
      font-size: 9px;
      color: #cbd5e1;
    }

    .dashboard-shell,
    .dashboard-stack {
      display: grid;
      gap: 16px;
    }

    .dashboard-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.88fr;
      gap: 22px;
      padding: 28px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 24%),
        linear-gradient(140deg, rgba(8, 15, 28, 0.96), rgba(15, 23, 42, 0.72));
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: var(--shadow);
    }

    .hero-copy {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .hero-decision {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(103, 232, 249, 0.2);
      color: #dff8ff;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .hero-copy h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .hero-copy p {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
      line-height: 1.75;
    }

    .hero-points {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .hero-point {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #dbeafe;
      font-size: 10px;
    }

    .hero-point::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(103, 232, 249, 0.9);
      box-shadow: 0 0 0 5px rgba(103, 232, 249, 0.08);
    }

    .hero-signal-grid {
      display: grid;
      gap: 12px;
      align-content: start;
      padding: 18px;
      border-radius: 24px;
      background: rgba(7, 14, 26, 0.42);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .brief-item {
      display: grid;
      gap: 6px;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    .brief-label {
      color: var(--muted);
      font-size: 9px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brief-item strong {
      font-size: 23px;
      letter-spacing: -0.04em;
    }

    .brief-item span {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .metrics-grid--priority {
      grid-template-columns: 1.24fr 1fr 0.86fr 0.86fr;
    }

    .metric-sub {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.55;
    }

    .metric-foot {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: #dbeafe;
      font-size: 9px;
    }

    .metric-card-primary,
    .metric-card-strong,
    .metric-card-secondary {
      position: relative;
      overflow: hidden;
    }

    .metric-card-primary {
      background:
        radial-gradient(circle at top right, rgba(103, 232, 249, 0.16), transparent 34%),
        linear-gradient(160deg, rgba(13, 24, 41, 0.96), rgba(18, 33, 56, 0.82));
      border: 1px solid rgba(103, 232, 249, 0.16);
    }

    .metric-card-strong {
      background:
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.12), transparent 36%),
        linear-gradient(160deg, rgba(22, 16, 8, 0.96), rgba(41, 27, 15, 0.82));
      border: 1px solid rgba(245, 158, 11, 0.16);
    }

    .metric-card-secondary {
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .metric-value-primary {
      font-size: 29px;
    }

    .metric-value-strong {
      font-size: 26px;
    }

    .dashboard-main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.24fr) minmax(320px, 0.82fr);
      gap: 16px;
    }

    .chart-card,
    .summary-card,
    .reminder-card {
      border-radius: 24px;
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .chart-card-featured {
      padding: 22px;
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent 26%),
        rgba(15, 23, 42, 0.76);
    }

    .dashboard-left-rail,
    .dashboard-side-rail {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .dashboard-split-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 0.9fr);
      gap: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-head h3 {
      margin: 0;
      font-size: 14px;
      letter-spacing: -0.02em;
    }

    .section-note {
      color: var(--muted);
      font-size: 9px;
    }

    .stage-chart {
      display: grid;
      gap: 12px;
    }

    .stage-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 40px;
      align-items: center;
      gap: 12px;
    }

    .stage-label,
    .stage-value,
    .rank-name,
    .rank-value,
    .axis-labels span {
      font-size: 10px;
    }

    .stage-value,
    .rank-value {
      color: #e2e8f0;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .line-chart {
      display: grid;
      gap: 8px;
      padding-top: 6px;
    }

    .line-chart svg {
      width: 100%;
      height: 190px;
      display: block;
    }

    .line-grid line {
      stroke: rgba(148, 163, 184, 0.16);
      stroke-width: 1;
      stroke-dasharray: 4 4;
    }

    .line-axis {
      fill: none;
      stroke: rgba(148, 163, 184, 0.22);
      stroke-width: 1.2;
    }

    .area-fill {
      fill: rgba(56, 189, 248, 0.12);
    }

    .trend-line {
      fill: none;
      stroke: #67e8f9;
      stroke-width: 3;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .trend-point {
      fill: #67e8f9;
      stroke: #04111f;
      stroke-width: 3;
    }

    .axis-labels {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
    }

    .ranking {
      display: grid;
      gap: 14px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px;
      gap: 12px;
      align-items: center;
    }

    .rank-bar {
      display: grid;
      gap: 8px;
    }

    .rank-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.14);
      overflow: hidden;
    }

    .rank-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(103, 232, 249, 0.92), rgba(56, 189, 248, 0.7));
    }

    .dashboard-summary-list,
    .dashboard-reminder-list {
      display: grid;
      gap: 12px;
    }

    .dashboard-summary-list {
      gap: 10px;
    }

    .dashboard-summary-item,
    .dashboard-reminder-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    .summary-head,
    .reminder-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .summary-title,
    .reminder-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      font-weight: 700;
    }

    .summary-text,
    .reminder-text {
      margin-top: 8px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.6;
    }

    .summary-card {
      background: rgba(13, 20, 35, 0.7);
    }

    .action-strip {
      display: grid;
      gap: 16px;
      padding: 22px 24px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(22, 30, 48, 0.9), rgba(11, 18, 32, 0.82));
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: var(--shadow);
    }

    .action-strip-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .action-strip-copy h3 {
      margin: 0;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .action-strip-copy p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .action-strip-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-strip-list {
      display: grid;
      gap: 12px;
    }

    .action-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    .action-item-copy {
      display: grid;
      gap: 8px;
    }

    .action-item-head {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .action-item-text {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.6;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .dot-ok {
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.08);
    }

    .dot-warn {
      background: var(--warn);
      box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.08);
    }

    .dot-danger {
      background: #ef4444;
      box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.08);
    }

    .status-badge {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 9px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge-ok {
      color: #d1fae5;
      border-color: rgba(34, 197, 94, 0.18);
      background: rgba(34, 197, 94, 0.08);
    }

    .badge-warn {
      color: #fde68a;

      line-height: 1.6;

    .actions {

    }

    .toolbar {
      margin: 14px 0;
    }

    .button-primary,
    .button-secondary,
    .button-link {
      min-height: var(--control-height);
      padding: 7px 13px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      font-size: 12px;
    }

    .button-small {
      min-height: var(--control-height-sm);
      padding: 6px 9px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: var(--bg-panel-soft);
      color: #e2e8f0;
    }

    .button-small.active {
      border-color: rgba(56, 189, 248, 0.2);
      background: rgba(56, 189, 248, 0.12);
      color: #e0f2fe;
    }

    .button-primary {
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: #fff;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
    }

    .button-secondary {
      background: var(--bg-panel-soft);
      color: #e2e8f0;
      border-color: rgba(148, 163, 184, 0.16);
    }

    .button-link {
      background: transparent;
      color: #bae6fd;
      border-color: rgba(56, 189, 248, 0.18);
    }

    .table {
      display: grid;
      gap: 10px;
    }

    .table-header,
    .table-row {
      display: grid;
      grid-template-columns: 40px 1.6fr 1.1fr 1fr 0.7fr 0.9fr 1fr 0.8fr;
      gap: 12px;
      align-items: center;
    }

    .table-header {
      padding: 0 6px;
      font-size: 9px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .table-row {
      cursor: pointer;
    }

    .table-row:hover {
      border-color: rgba(56, 189, 248, 0.2);
      background: rgba(15, 23, 42, 0.62);
    }

    .project-select-cell {
      display: flex;
      justify-content: center;
    }

    .project-select {
      width: 16px;
      height: 16px;
      accent-color: #38bdf8;
    }

    .progress-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tag,
    .stage-chip,
    .record-badge {
      padding: 7px 10px;
      background: rgba(15, 23, 42, 0.56);
      border-color: rgba(148, 163, 184, 0.14);
      color: #e2e8f0;
    }

    .tag.ready,
    .stage-chip.done {
      color: #d1fae5;
      border-color: rgba(34, 197, 94, 0.18);
      background: rgba(34, 197, 94, 0.08);
    }

    .tag.warn,
    .stage-chip.current {
      color: #fde68a;
      border-color: rgba(245, 158, 11, 0.18);
      background: rgba(245, 158, 11, 0.08);
    }

    .record-badge {
      color: #bfdbfe;
      background: rgba(37, 99, 235, 0.12);
      border-color: rgba(96, 165, 250, 0.16);
    }

    .detail-card h3 {
      margin-bottom: 9px;
      font-size: 12px;
    }

    .detail-stack,
    .stage-list,
    .record-list,
    .checklist,
    .summary-list {
      display: grid;
      gap: 12px;
    }

    .detail-edit-form,
    .package-form {
      display: grid;
      gap: 14px;
    }

    .detail-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .detail-card-head h3 {
      margin: 0;
    }

    .check-item,
    .record-item {
      align-items: flex-start;
    }

    .check-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty-state {
      text-align: center;
    }

    .empty-state h3 {
      margin: 0 0 6px;
    }

    .toast-region {
      position: fixed;
      top: 24px;
      right: 24px;
      display: grid;
      gap: 12px;
      z-index: 20;
    }

    .toast {
      min-width: 260px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: var(--bg-panel-strong);
      border: 1px solid var(--line-strong);
      color: var(--text-strong);
      box-shadow: var(--shadow-raised);
    }

    .toast.success {
      border-color: rgba(34, 197, 94, 0.26);
    }

    .toast.warning {
      border-color: rgba(245, 158, 11, 0.28);
    }

    .toast.error {
      border-color: rgba(249, 115, 22, 0.28);
    }

    .settings-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      width: min(360px, calc(100vw - 32px));
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      background: var(--bg-panel-strong);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow-panel);
      z-index: 25;
    }

    .toggle-field {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-main);
    }

    .toggle-field input {
      width: 16px;
      height: 16px;
      min-height: 16px;
    }

    .hidden {
      display: none !important;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
      background: rgba(2, 6, 23, 0.62);
      backdrop-filter: blur(2px);
      z-index: 40;
      overflow-y: auto;
    }

    .modal-card {
      width: min(680px, 100%);
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      background: var(--bg-panel-strong);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow-panel);
    }

    body[data-density="compact"] .page-card,
    body[data-density="compact"] .detail-card,
    body[data-density="compact"] .table-row,
    body[data-density="compact"] .metric-card,
    body[data-density="compact"] .chart-card,
    body[data-density="compact"] .summary-card,
    body[data-density="compact"] .reminder-card,
    body[data-density="compact"] .action-strip {
      padding: 14px;
    }

    .requirement-workspace {
      display: grid;
      grid-template-columns: minmax(280px, 320px) minmax(420px, 1fr);
      gap: 12px;
      align-items: stretch;
      width: 100%;
      max-width: 100%;
      height: calc(100vh - 96px);
      min-height: min(620px, calc(100vh - 128px));
      overflow: hidden;
    }

    .execution-workspace {
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(420px, 1fr);
      gap: 12px;
      align-items: stretch;
      width: 100%;
      max-width: 100%;
      height: calc(100vh - 96px);
      min-height: min(620px, calc(100vh - 128px));
      overflow: hidden;
    }

    .execution-results {
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .execution-structure-pane {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
      min-height: 0;
      height: 100%;
    }

    .execution-computation-pane {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      height: 100%;
      overflow-y: auto;
    }

    .execution-structure-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .execution-structure-bar .version-select {
      flex: 1;
    }

    .execution-stage-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .auto-modeling-card {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.12), rgba(167, 139, 250, 0.1));
      display: grid;
      gap: 6px;

    .auto-modeling-card .helper-text {
      margin: 0;

    .chat-step-label {

      font-weight: 600;
      color: #7dd3fc;
      margin-bottom: 4px;

      gap: 6px;

    .spec-chip {

      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.1);
      color: #e0f2fe;
      font-size: 11px;
      cursor: pointer;
    }

      border-color: rgba(167, 139, 250, 0.45);
      background: rgba(167, 139, 250, 0.14);

    }

    .stage-chip {
      flex: 1;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(15, 23, 42, 0.42);
      color: #cbd5e1;
      font-size: 11px;
      cursor: pointer;

      border-color: rgba(56, 189, 248, 0.55);
      background: rgba(56, 189, 248, 0.14);

      font-size: 12px;
      line-height: 1.6;

    .execution-module-chip {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.22);

      font-size: 10px;
      background: rgba(15, 23, 42, 0.42);

      background: rgba(34, 197, 94, 0.12);

    .execution-module-chip.in_progress {
      border-color: rgba(56, 189, 248, 0.4);
      color: #7dd3fc;
      background: rgba(56, 189, 248, 0.12);

    .progress-list span.failed {

      gap: 5px;

      background: transparent;

      gap: 6px;

      font-size: 10px;

      padding: 7px 10px;

      margin: 14px 0 4px;
      padding: 14px 8px 6px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.32);
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .wp-step {
      flex: 1;
      min-width: 72px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 0 4px;
      background: transparent;
      border: 0;
      cursor: pointer;
      text-align: center;
    }

    .wp-step::before {
      content: "";
      position: absolute;
      top: 15px;
      right: 50%;
      width: 100%;
      height: 2px;
      background: rgba(148, 163, 184, 0.25);
      z-index: 0;
    }

    .wp-step:first-child::before {
      display: none;
    }

    .wp-dot {
      position: relative;
      z-index: 1;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(148, 163, 184, 0.35);
      background: rgba(15, 23, 42, 0.8);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .wp-label {
      font-size: 11px;
      color: #cbd5e1;
      white-space: nowrap;
    }

    .plan-substeps {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .plan-substep {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.35);
      cursor: pointer;
      text-align: center;
      font: inherit;
      color: var(--muted);
    }

    .plan-substep.active {
      border-color: rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.08);
      color: #fff;
    }

    .plan-substep .step-num {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      background: rgba(148, 163, 184, 0.3);
      margin-right: 6px;
    }

    .plan-substep.done .step-num {
      background: rgba(34, 197, 94, 0.5);
    }

    .computation-pane {
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 12px;
      height: calc(100vh - 300px);
      min-height: 420px;
    }

    .step-timeline { display: grid; gap: 6px; }

    .step-item {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.4);
      cursor: pointer;
      font-size: 11px;
      display: grid;
      gap: 2px;
      text-align: left;
      font: inherit;
      color: inherit;
    }

    .step-item.active {
      border-color: rgba(56, 189, 248, 0.4);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.22);
    }

    .step-item.done {
      border-color: rgba(34, 197, 94, 0.45);
      border-left: 3px solid rgba(34, 197, 94, 0.9);
      background: rgba(34, 197, 94, 0.14);
    }

    .step-item.running {
      border-color: rgba(234, 179, 8, 0.45);
      border-left: 3px solid rgba(234, 179, 8, 0.9);
      background: rgba(234, 179, 8, 0.14);
    }

    .step-item.failed {
      border-color: rgba(239, 68, 68, 0.5);
      border-left: 3px solid rgba(239, 68, 68, 0.9);
      background: rgba(239, 68, 68, 0.14);
    }

    .step-item.done .step-name { color: #bbf7d0; }
    .step-item.running .step-name { color: #fde68a; }
    .step-item.failed .step-name { color: #fecaca; }

    .step-item.done .step-meta { color: #86efac; }
    .step-item.running .step-meta { color: #facc15; }
    .step-item.failed .step-meta { color: #fca5a5; }

    .step-name { font-weight: 600; color: #e2e8f0; }
    .step-meta { color: #64748b; font-size: 10px; }

    .used-skills-card {
      margin: 10px 0 12px;
      padding: 10px 12px;
      border: 1px solid rgba(56, 189, 248, 0.22);
      border-radius: 10px;
      background: rgba(14, 165, 233, 0.08);
      display: grid;
      gap: 8px;
    }

    .used-skills-title {
      font-size: 11px;
      font-weight: 700;
      color: #bae6fd;
      letter-spacing: 0.02em;
    }

    .used-skill-item {
      display: grid;
      gap: 4px;
      font-size: 11px;
      color: #cbd5e1;
    }

    .used-skill-name { font-weight: 700; color: #e0f2fe; }
    .used-skill-script { color: #93c5fd; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    .computation-run-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
    }

    .computation-run-card {
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 14px;
      padding: 12px;
      margin: 12px 0;
      background: rgba(15, 23, 42, 0.5);
      display: grid;
      gap: 8px;
    }

    .computation-log {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      color: #cbd5e1;
      background: rgba(2, 6, 23, 0.45);
      border-radius: 10px;
      padding: 8px;
      max-height: 180px;
      overflow: auto;
    }

    .artifact-list {
      display: grid;
      gap: 6px;
    }

    .artifact-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 10px;
      padding: 8px;
      background: rgba(15, 23, 42, 0.35);
      font-size: 11px;
    }

    .mol-progress { display: grid; gap: 6px; margin: 12px 0; }

    .mol-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--line);
      font-size: 11px;
    }

    .mol-item.done { border-color: rgba(34, 197, 94, 0.3); }
    .mol-item.current { border-color: rgba(56, 189, 248, 0.4); }

    .execution-chat-stream {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      overflow-y: auto;
      overscroll-behavior: contain;
      background: rgba(15, 23, 42, 0.2);
    }

    .wp-desc {
      font-size: 10px;
      color: rgba(148, 163, 184, 0.7);
    }

    .wp-step.done .wp-dot {
      background: rgba(34, 197, 94, 0.2);
      border-color: rgba(34, 197, 94, 0.65);
      color: #bbf7d0;
    }

    .wp-step.done::before {
      background: rgba(34, 197, 94, 0.6);
    }

    .wp-step.current .wp-dot {
      background: var(--brand);
      border-color: var(--brand);
      color: #04263d;
    }

    .wp-step.current .wp-label {
      color: #e0f2fe;
      font-weight: 700;
    }

    .workflow-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .delivery-grid .detail-stack {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .info-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .overview-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin: 14px 0 4px;
    }

    .overview-stat {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.08), rgba(15, 23, 42, 0.35));
    }

    .os-label {
      font-size: 11px;
      color: var(--muted);
    }

    .os-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
    }

    .os-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .os-sub.warn {
      color: #fcd34d;
    }

    .os-sub.danger {
      color: #fca5a5;
    }

    .os-bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.18);
      overflow: hidden;
    }

    .os-bar span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: var(--brand);
    }

    .overview-timeline {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.32);
    }

    .info-item--full {
      margin-top: 12px;
    }

    .info-label {
      font-size: 11px;
      color: var(--muted);
    }

    .info-value {
      font-size: 14px;
      color: var(--text-main);
      word-break: break-word;
    }

    .workflow-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.35);
    }

    .workflow-card.current {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.2) inset;
    }

    .workflow-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .workflow-card-head h4 {
      margin: 0;
      font-size: 14px;
    }

    .wf-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .wf-done {
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.16);
    }

    .wf-current {
      color: #bae6fd;
      background: rgba(56, 189, 248, 0.16);
    }

    .wf-pending {
      color: #cbd5e1;
      background: rgba(148, 163, 184, 0.14);
    }

    .wf-desc {
      flex: 1;
      margin: 0;
      font-size: 11px;
      color: var(--muted);
    }

    .wf-enter {
      align-self: flex-start;
      height: 28px;
      padding: 0 14px;
      font-size: 12px;
    }

    .version-select {
      height: 32px;
      padding: 0 10px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.42);
    }

    .markdown-preview {
      min-height: 0;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(2, 6, 23, 0.28);
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.72;
      overflow: auto;
    }

    .markdown-editor {
      min-height: 0;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.32);
      background: rgba(2, 6, 23, 0.45);
      color: #e2e8f0;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 12px;
      line-height: 1.7;
      resize: none;
      overflow: auto;
    }

    .markdown-editor:focus {
      outline: none;
      border-color: var(--brand);
    }

    .markdown-preview > *:first-child {
      margin-top: 0;
    }

    .markdown-preview > *:last-child {
      margin-bottom: 0;
    }

    .markdown-preview h1,
    .markdown-preview h2,
    .markdown-preview h3 {
      margin: 14px 0 8px;
      color: #f8fafc;
      line-height: 1.35;
    }

    .markdown-preview h1 {
      font-size: 18px;
    }

    .markdown-preview h2 {
      font-size: 15px;
    }

    .markdown-preview h3 {
      font-size: 13px;
    }

    .markdown-preview p,
    .markdown-preview ul,
    .markdown-preview ol,
    .markdown-preview blockquote,
    .markdown-preview pre,
    .markdown-preview table {
      margin: 0 0 10px;
    }

    .markdown-preview ul,
    .markdown-preview ol {
      padding-left: 22px;
    }

    .markdown-preview li + li {
      margin-top: 4px;
    }

    .markdown-preview strong {
      color: #f8fafc;
      font-weight: 700;
    }

    .markdown-preview code {
      padding: 1px 5px;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.86);
      color: #bae6fd;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 11px;
    }

    .markdown-preview pre {
      padding: 10px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.86);
      overflow: auto;
    }

    .markdown-preview pre code {
      padding: 0;
      background: transparent;
    }

    .markdown-preview blockquote {
      padding-left: 12px;
      border-left: 3px solid rgba(56, 189, 248, 0.6);
      color: #94a3b8;
    }

    .markdown-preview table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .markdown-preview th,
    .markdown-preview td {
      padding: 7px 8px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      text-align: left;
      vertical-align: top;
    }

    .markdown-preview th {
      color: #f8fafc;
      background: rgba(15, 23, 42, 0.74);
    }

    .markdown-diff {
      display: grid;
      gap: 6px;
    }

    .markdown-diff-line {
      padding: 5px 8px;
      border-radius: 9px;
      border: 1px solid transparent;
    }

    .markdown-diff-line > *:first-child {
      margin-top: 0;
    }

    .markdown-diff-line > *:last-child {
      margin-bottom: 0;
    }

    .markdown-diff-added {
      border-color: rgba(34, 197, 94, 0.28);
      background: rgba(34, 197, 94, 0.12);
    }

    .markdown-diff-removed {
      border-color: rgba(248, 113, 113, 0.3);
      color: #fecaca;
      background: rgba(248, 113, 113, 0.1);
      text-decoration: line-through;
      text-decoration-color: rgba(248, 113, 113, 0.8);
    }

    @media (max-width: 1360px) {
      .requirement-workspace,
      .execution-workspace {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(260px, 0.42fr) minmax(0, 1fr);
        overflow: hidden;
      }
    }

    @media (max-width: 1180px) {
      .requirement-workspace {
        grid-template-columns: 1fr;
      }

      .grid-metrics,
      .grid-charts,
      .dashboard-bottom,
      .detail-grid,
      .form-grid,
      .detail-form-grid,
      .metrics-grid,
      .dashboard-main-grid,
      .dashboard-split-grid,
      .dashboard-hero {
        grid-template-columns: 1fr 1fr;
      }

      .table-header,
      .table-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: 2;
      }

      .main {
        order: 1;
      }

      .grid-metrics,
      .grid-charts,
      .dashboard-bottom,
      .detail-grid,
      .form-grid,
      .detail-form-grid,
      .metrics-grid,
      .dashboard-main-grid,
      .dashboard-split-grid,
      .dashboard-hero {
        grid-template-columns: 1fr;
      }

      .page-header {
        flex-direction: column;
      }

      .page-header--split {
        grid-template-columns: 1fr;
      }

      .action-strip-head,
      .action-item {
        grid-template-columns: 1fr;
      }

      .status-group {
        justify-content: flex-start;
      }

      .page-header-side {
        justify-items: start;
      }

      .table-header {
        display: none;
      }

      .table-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">SF</div>
          <div>
            <h1 class="brand-title">SimFlow</h1>
            <div class="brand-sub">计算模拟项目管理系统</div>
          </div>
        </div>

        <div>
          <div class="nav-title">主导航</div>
          <div class="nav-group" id="navGroup"></div>
        </div>

      </aside>

      <main class="main" id="mainContent"></main>
    </div>
  </div>
  <div class="toast-region" id="toastRegion" aria-live="polite" aria-atomic="true"></div>
  <aside class="settings-panel hidden" id="settingsPanel" aria-labelledby="settingsTitle">
    <div class="detail-card-head">
      <h3 id="settingsTitle">全局设置</h3>
      <button class="button-link" id="closeSettingsButton" type="button">关闭</button>
    </div>
    <form class="detail-edit-form" id="settingsForm">
      <div class="field-group">
        <label for="defaultPageSelect">默认首页</label>
        <select id="defaultPageSelect" name="defaultPage">
          <option value="dashboard">项目仪表盘</option>
          <option value="projects">项目列表</option>
          <option value="workspace">项目工作台</option>
          <option value="create">新建项目</option>
        </select>
      </div>
      <div class="field-group">
        <label for="defaultSortSelect">项目列表默认排序</label>
        <select id="defaultSortSelect" name="projectsSort">
          <option value="deliveryAsc">按交付日期升序</option>
          <option value="amountDesc">按金额降序</option>
          <option value="progressDesc">按进度降序</option>
        </select>
      </div>
      <div class="field-group">
        <label for="densitySelect">页面密度</label>
        <select id="densitySelect" name="density">
          <option value="comfortable">舒适</option>
          <option value="compact">紧凑</option>
        </select>
      </div>
      <label class="toggle-field" for="helperTextToggle">
        <input id="helperTextToggle" name="showHelperText" type="checkbox">
        <span>显示辅助说明</span>
      </label>
      <div class="actions">
        <button class="button-primary" type="submit">保存设置</button>
      </div>
    </form>
  </aside>

  <div class="modal-overlay hidden" id="createProjectModal" role="dialog" aria-modal="true" aria-labelledby="createProjectTitle">
    <div class="modal-card">
      <div class="detail-card-head">
        <h3 id="createProjectTitle">新建项目</h3>
        <button class="button-link" id="closeCreateProjectButton" type="button">关闭</button>
      </div>
      <p class="helper-text">填写项目基础信息，保存后立即进入项目工作台继续维护。</p>
      <form id="projectForm">
        <div class="form-grid">
          <div class="field-group">
            <label for="name">项目名称</label>
            <input id="name" name="name" required>
          </div>
          <div class="field-group">
            <label for="customer">客户名称</label>
            <input id="customer" name="customer" required>
          </div>
          <div class="field-group">
            <label for="amount">项目金额</label>
            <input id="amount" name="amount" type="number" min="0" required>
          </div>
          <div class="field-group">
            <label for="plannedDeliveryDate">计划交付日期</label>
            <input id="plannedDeliveryDate" name="plannedDeliveryDate" type="date" required>
          </div>
          <div class="field-group">
            <label for="template">项目模板</label>
            <select id="template" name="template">
              <option>标准计算项目</option>
              <option>扩散模拟模板</option>
              <option>界面分析模板</option>
              <option>吸附能扫描模板</option>
            </select>
          </div>
          <div class="field-group">
            <label for="rootDirectory">根目录路径</label>
            <input id="rootDirectory" name="rootDirectory" value="/data/projects/new-project">
          </div>
          <div class="field-group wide">
            <label for="description">项目简介</label>
            <textarea id="description" name="description"></textarea>
          </div>
        </div>
        <div class="actions">
          <button class="button-secondary" id="cancelCreateProjectButton" type="button">取消</button>
          <button class="button-primary" type="submit">创建项目</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const apiBaseUrl = window.location.origin;
    const urlParams = new URLSearchParams(window.location.search);
    const preferencesStorageKey = "simflow.preferences";
    const defaultPreferences = {
      defaultPage: "dashboard",
      projectsSort: "deliveryAsc",
      density: "comfortable",
      showHelperText: true
    };
    const initialPreferences = loadPreferences();
    const rawPage = urlParams.get("page") || initialPreferences.defaultPage;
    const LEGACY_PAGE_REDIRECTS = {
      detail: { page: "workspace", tab: "overview" },
      requirements: { page: "workspace", tab: "plan" },
      execution: { page: "workspace", tab: "modeling" }
    };
    const legacyRedirect = LEGACY_PAGE_REDIRECTS[rawPage] || null;
    const legacyRoutePage = legacyRedirect ? rawPage : null;
    const currentPage = legacyRedirect ? legacyRedirect.page : rawPage;
    const currentProjectId = urlParams.get("id") || "p-001";
    const initialWorkspaceTab = urlParams.get("tab") || (legacyRedirect ? legacyRedirect.tab : null) || "overview";

    const navItems = [
      { page: "dashboard", label: "项目仪表盘" },
      { page: "projects", label: "项目列表" },
      { page: "workspace", label: "项目工作台", id: currentProjectId }
    ];

    const fallbackProjects = [
      {
        id: "p-001",
        name: "锂电电解液扩散模拟",
        customer: "华东新能源",
        amount: 42,

    function buildLineDiff(previousMarkdown, currentMarkdown) {
      const previousLines = String(previousMarkdown || "").split("\n");
      const currentLines = String(currentMarkdown || "").split("\n");
      const rows = previousLines.length + 1;
      const cols = currentLines.length + 1;
      const table = Array.from({ length: rows }, () => Array(cols).fill(0));

      for (let i = previousLines.length - 1; i >= 0; i -= 1) {
        for (let j = currentLines.length - 1; j >= 0; j -= 1) {
          table[i][j] = previousLines[i] === currentLines[j]
            ? table[i + 1][j + 1] + 1
            : Math.max(table[i + 1][j], table[i][j + 1]);
        }
      }

      const changes = [];
      let i = 0;
      let j = 0;
      while (i < previousLines.length && j < currentLines.length) {
        if (previousLines[i] === currentLines[j]) {
          changes.push({ type: "same", text: currentLines[j] });
          i += 1;
          j += 1;
        } else if (table[i + 1][j] >= table[i][j + 1]) {
          changes.push({ type: "removed", text: previousLines[i] });
          i += 1;
        } else {
          changes.push({ type: "added", text: currentLines[j] });
          j += 1;
        }
      }
      while (i < previousLines.length) {
        changes.push({ type: "removed", text: previousLines[i] });
        i += 1;
      }
      while (j < currentLines.length) {
        changes.push({ type: "added", text: currentLines[j] });
        j += 1;
      }
      return changes;
    }

    function renderMarkdownDiffPreview(markdown, previousMarkdown) {
      const changes = buildLineDiff(previousMarkdown, markdown);
      return `
        <div class="markdown-diff">
          ${changes.map((change) => `
            <div class="markdown-diff-line markdown-diff-${change.type}">
              ${renderMarkdownPreview(change.text || " ")}
            </div>
          `).join("")}
        </div>
      `;
    }

    function navigateTo(page, id, extras) {
      const legacy = LEGACY_PAGE_REDIRECTS[page];
      if (legacy) {
        page = legacy.page;
        extras = { ...(extras || {}), tab: extras?.tab || legacy.tab };
      }
      const url = new URL(window.location.href);
      url.searchParams.set("page", page);
      if (id) {
        url.searchParams.set("id", id);
      } else {
        url.searchParams.delete("id");
      }
      url.searchParams.delete("tab");
      if (extras && typeof extras === "object") {
        Object.entries(extras).forEach(([key, value]) => {
          if (value === undefined || value === null || value === "") {
            url.searchParams.delete(key);
          } else {
            url.searchParams.set(key, value);
          }
        });
      }
      window.location.href = url.toString();
    }

    async function streamRequirement(path, payload, onEvent) {
      const response = await fetch(`${apiBaseUrl}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!response.ok || !response.body) {
        throw new Error(`HTTP ${response.status}`);
      }
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { done, value } = await reader.read();
        if (done) {
          break;
        }
        buffer += decoder.decode(value, { stream: true });
        let separatorIndex;
        while ((separatorIndex = buffer.indexOf("\n\n")) >= 0) {
          const rawEvent = buffer.slice(0, separatorIndex);
          buffer = buffer.slice(separatorIndex + 2);
          const dataLine = rawEvent.split("\n").find((line) => line.startsWith("data:"));
          if (!dataLine) {
            continue;
          }
          const json = dataLine.slice(5).trim();
          if (!json) {
            continue;
          }
          let event;
          try {
            event = JSON.parse(json);
          } catch (error) {
            continue;
          }
          onEvent(event);
        }
      }
    }

    // --- 建模规划（方案 → 建模 衔接） ---
    function modelingTypeLabel(type) {
      return ({ molecule: "分子", ion: "离子", surface: "表面", slab: "slab", polymer: "聚合物", cluster: "团簇" })[type] || type || "";
    }

    function modelingKindLabel(kind) {
      return ({ molecule: "单分子", bulk: "体相体系", surface: "表面", interface: "界面", adsorption: "吸附", crystal: "晶体" })[kind] || kind || "体系";
    }

    function modelingSpecHasContent(spec) {
      return Boolean(spec && ((spec.buildingBlocks || []).length || spec.targetSystem));
    }

    function modelingSpecMarkdown(spec) {
      const blocks = spec.buildingBlocks || [];
      const target = spec.targetSystem || {};
      const lines = ["", "---", "", "## 建模规划", ""];
      if (blocks.length) {
        lines.push("**待构建对象**", "");
        blocks.forEach((block) => {
          const meta = [block.formula, modelingTypeLabel(block.type), block.role].filter(Boolean).join(" · ");
          lines.push(`- **${block.name}**${meta ? `（${meta}）` : ""}${block.note ? ` — ${block.note}` : ""}`);
        });
        lines.push("");
      }
      const comps = (target.components || []).map((comp) => `${comp.block}×${comp.count || "适量"}`).join("、");
      lines.push("**目标体系**", "");
      lines.push(`- 类型：${modelingKindLabel(target.kind)}${target.summary ? `（${target.summary}）` : ""}`);
      if (comps) lines.push(`- 组成：${comps}`);
      if (target.box) lines.push(`- 盒子/晶胞：${target.box}`);
      if (target.interface) {
        const itf = target.interface;
        const phases = [itf.phaseA, itf.phaseB].filter(Boolean).join(" / ");
        lines.push(`- 界面：${phases}${itf.note ? `（${itf.note}）` : ""}`);
      }
      return lines.join("\n");
    }

    function renderRequirementSpecBlock(task) {
      if (state.requirementSpecLoading) {
        return `<div class="modeling-spec-note">正在从方案抽取建模规划…</div>`;
      }
      const spec = task?.documents?.modelingSpec;
      if (!modelingSpecHasContent(spec)) {
        return "";
      }
      return `<div class="modeling-spec-block">${renderMarkdownPreview(modelingSpecMarkdown(spec))}</div>`;
    }

    async function ensureRequirementModelingSpec(task) {
      if (!task?.documents?.plan) {
        return;
      }
      const spec = task.documents.modelingSpec;
      const planVersion = task.documents.plan.currentVersionId;
      if (spec && spec.planVersionId === planVersion) {
        return;
      }
      state.requirementSpecLoading = true;
      if (state.requirementActiveTab === "plan") {
        renderRequirementAnalysis();
      }
      try {
        const data = await postJson(`/api/requirement-tasks/${task.id}/modeling-spec`, { model: state.requirementModel });
        if (data.task) {
          state.activeRequirementTask = data.task;
          state.requirementTasks = state.requirementTasks.map((item) => item.id === data.task.id ? data.task : item);
        }
      } catch (error) {
        // 建模规划抽取失败不阻塞主流程
      } finally {
        state.requirementSpecLoading = false;
        renderRequirementAnalysis();
      }
    }

    function renderRequirementThinkingMarkdown(task) {
      const steps = task?.steps || [];
      const documents = task?.documents || {};
      const analysisReasoning = String(documents.analysis?.reasoning || "").trim();
      const planReasoning = String(documents.plan?.reasoning || "").trim();
      const hasReasoning = Boolean(analysisReasoning || planReasoning);
      return [
        "# 小P思考过程",
        "",
        "> 这里展示模型内部的隐藏推理链路（reasoning），用于说明小P是如何一步步得到结论的。",
        "",
        "## 当前技能步骤",
        "",
        ...steps.map((step) => `- ${getRequirementStepIcon(step.status)} **${step.label}**：${step.detail}`),
        "",
        "## 解析任务 · 推理链路",
        "",
        analysisReasoning || "_等待小P解析任务后展示推理链路。_",
        "",
        "## 生成方案 · 推理链路",
        "",
        planReasoning || "_等待小P生成方案后展示推理链路。_",
        ...(hasReasoning
          ? []
          : ["", "> 注：当前模型未返回隐藏推理内容，仅展示技能步骤进度。"])
      ].join("\n");
    }

    function buildPendingRequirementTask(fileName, fileType) {
      const now = new Date().toISOString();
      return {
        id: "pending-requirement-task",
        fileName,
        fileType: fileType || "text/markdown",
        status: "processing",
        sourceText: "",
        steps: [
          { label: "读取文档", status: "completed", detail: "已开始读取本地文件" },
          { label: "解析任务", status: "in_progress", detail: "小P 正在识别目标、约束、交付物和风险" },
          { label: "生成方案", status: "pending", detail: "等待解析结果后生成 Markdown 实施方案" }
        ],
        conversation: [
          { role: "user", content: `已上传：${fileName}`, createdAt: now },
          { role: "assistant", content: "正在解析需求文档，请稍候。", createdAt: now }
        ],
        documents: {},
        exports: [],
        createdAt: now,
        updatedAt: now
      };
    }

    function buildPendingRequirementMessageTask(task, message) {
      const now = new Date().toISOString();
      return {
        ...task,
        optimizationPending: true,
        optimizationStage: "understand",
        conversation: [
          ...(task.conversation || []),
          { role: "user", content: message, createdAt: now },
          { role: "assistant", content: "正在理解修改要求...", transient: true, createdAt: now }
        ],
        updatedAt: now
      };
    }

    function buildFailedRequirementMessageTask(task, message) {
      return {
        ...task,
        optimizationPending: false,
        conversation: [
          ...((task && task.conversation) || []),
          { role: "assistant", content: `方案优化失败：${message || "请稍后重试"}`, createdAt: new Date().toISOString() }
        ],
        updatedAt: new Date().toISOString()
      };
    }

    function buildTerminatedRequirementTask(task) {
      const baseTask = task || buildPendingRequirementTask("需求文档", "text/plain");
      return {
        ...baseTask,
        status: "failed",
        steps: (baseTask.steps || []).map((step) => step.status === "completed"
          ? step
          : { ...step, status: "failed", detail: "已被用户终止" }
        ),
        conversation: [
          ...((baseTask.conversation || []).filter((message) => !message.transient)),
          { role: "assistant", content: "已终止本次解析。你可以重新上传需求文档。", createdAt: new Date().toISOString() }
        ],
        optimizationPending: false,
        updatedAt: new Date().toISOString()
      };
    }

    function cancelRequirementProcessing() {
      state.requirementAbortRequested = true;
      state.activeRequirementTask = buildTerminatedRequirementTask(state.activeRequirementTask);
      renderRequirementAnalysis();
      showToast("已终止本次解析", "error");
    }

    function buildFailedRequirementTask(task, message) {
      return {
        ...(task || buildPendingRequirementTask("需求文档", "text/plain")),
        status: "failed",
        steps: [
          { label: "读取文档", status: "completed", detail: "已读取本地文件" },
          { label: "解析任务", status: "failed", detail: message || "模型解析失败，请稍后重试" },
          { label: "生成方案", status: "pending", detail: "未生成实施方案" }
        ],
        conversation: [
          ...((task && task.conversation) || []),
          { role: "assistant", content: `解析失败：${message || "请稍后重试"}`, createdAt: new Date().toISOString() }
        ],
        updatedAt: new Date().toISOString()
      };
    }

    function getRequirementStepIcon(status) {
      if (status === "completed") {
        return "✓";
      }
      if (status === "in_progress") {
        return "…";
      }
      if (status === "failed") {
        return "!";
      }
      return "○";
    }

    function getRequirementStepClass(status) {
      if (status === "completed") {
        return "completed";
      }
      if (status === "in_progress") {
        return "running";
      }
      if (status === "failed") {
        return "failed";
      }
      return "pending";
    }

    function isAutomaticRequirementMessage(message) {
      if ((message?.usedSkills || []).length) return false;
      const content = String(message?.content || "");
      return content.startsWith("已上传：")
        || content === "正在解析需求文档，请稍候。"
        || content === "已完成读取文档、解析任务和生成方案。";
    }

    function renderRequirementConversation(task) {
      if (!task) {
        return `
          <div class="chat-message assistant">
            <div class="chat-role">小P</div>
            等待上传需求文档。
          </div>
        `;
      }

      const progressMessage = `
        <div class="chat-message assistant">
          <div class="chat-role">小P 执行过程</div>
          <div class="progress-list">
            ${(task.steps || []).map((step) => `
              <div><span class="${getRequirementStepClass(step.status)}">${getRequirementStepIcon(step.status)}</span>${escapeHtml(step.label)}：${escapeHtml(step.detail)}</div>
            `).join("")}
          </div>
        </div>
      `;

      const conversation = (task.conversation || [])
        .filter((message) => !isAutomaticRequirementMessage(message))
        .map((message) => `
        <div class="chat-message ${message.role === "assistant" ? "assistant" : ""}">
          <div class="chat-role">${message.role === "assistant" ? "小P" : "用户"}${message.role === "assistant" ? renderMessageUsedSkills(message) : ""}</div>
          ${escapeHtml(message.content)}
        </div>
      `).join("");

      return `${progressMessage}${conversation}`;
    }

    async function readRequirementFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(reader.error || new Error("file read failed"));
        reader.readAsText(file);
      });
    }

    async function runRequirementSkillSteps(task) {
      let currentTask = task;
      while (currentTask.status !== "completed") {
        if (state.requirementAbortRequested) {
          return null;
        }
        state.requirementStream = { active: true, reasoning: "", content: "", target: "analysis" };
        await streamRequirement(`/api/requirement-tasks/${currentTask.id}/run-next-step`, { model: state.requirementModel }, (event) => {
          if (event.type === "step") {
            currentTask = event.task;
            state.activeRequirementTask = currentTask;
            state.requirementStream.target = event.skill === "generate_plan" ? "plan" : "analysis";
            state.requirementActiveTab = state.requirementStream.target;
            renderRequirementAnalysis();
          } else if (event.type === "reasoning") {
            state.requirementStream.reasoning += event.text;
            updateRequirementStreamingView();
          } else if (event.type === "content") {
            state.requirementStream.content += event.text;
            updateRequirementStreamingView();
          } else if (event.type === "done") {
            currentTask = event.task;
          } else if (event.type === "error") {
            throw new Error(event.error);
          }
        });
        state.requirementStream = null;
        if (state.requirementAbortRequested) {
          return null;
        }
        state.activeRequirementTask = currentTask;
        state.requirementTasks = [currentTask, ...state.requirementTasks.filter((item) => item.id !== currentTask.id)];
        renderRequirementAnalysis();
      }
      return currentTask;
    }

    async function createRequirementTask(event) {
      event.preventDefault();
      const fileInput = document.getElementById("requirementFileInput");
      const submitButton = event.currentTarget.querySelector('button[type="submit"]');
      const file = fileInput?.files?.[0];
      if (!file) {
        showToast("请先选择需求文档", "error");
        return;
      }

      setActionLoading(submitButton, true, "解析中...");
      state.requirementAbortRequested = false;
      state.requirementEditMode = false;
      try {
        state.activeRequirementTask = buildPendingRequirementTask(file.name, file.type);
        state.requirementActiveTab = "analysis";
        renderRequirementAnalysis();
        const content = await readRequirementFile(file);
        if (state.requirementAbortRequested) {
          return;
        }
        const data = await postJson("/api/requirement-tasks", {
          fileName: file.name,
          fileType: file.type,
          content,
          projectId: state.inWorkspace ? (state.workspace?.project?.id || "") : ""
        });
        if (state.requirementAbortRequested) {
          return;
        }
        state.activeRequirementTask = data.task;
        if (state.inWorkspace && state.workspace) {
          state.workspace.requirementTask = data.task;
        }
        state.requirementTasks = [data.task, ...state.requirementTasks.filter((task) => task.id !== data.task.id)];
        state.requirementActiveTab = "analysis";
        renderRequirementAnalysis();
        const completedTask = await runRequirementSkillSteps(data.task);
        if (!completedTask) {
          return;
        }
        state.activeRequirementTask = completedTask;
        state.requirementTasks = [completedTask, ...state.requirementTasks.filter((task) => task.id !== completedTask.id)];
        state.requirementActiveTab = "analysis";
        if (state.inWorkspace && state.workspace) {
          state.workspace.requirementTask = completedTask;
          renderWorkspacePage();
        } else {
          renderRequirementAnalysis();
        }
        showToast("需求解析已完成", "success");
        ensureRequirementModelingSpec(completedTask);
      } catch (error) {
        if (state.requirementAbortRequested) {
          return;
        }
        state.activeRequirementTask = buildFailedRequirementTask(state.activeRequirementTask, error.message);
        state.requirementActiveTab = "analysis";
        renderRequirementAnalysis();
        showToast(`需求解析失败：${error.message}`, "error");
      } finally {
        setActionLoading(submitButton, false, "解析中...");
      }
    }

    async function sendRequirementMessage(event) {
      event.preventDefault();
      if (!state.activeRequirementTask) {
        showToast("请先上传需求文档", "error");
        return;
      }
      const input = document.getElementById("requirementMessageInput");
      const message = String(input?.value || "").trim();
      if (!message) {
        return;
      }

      const submitButton = event.currentTarget.querySelector('button[type="submit"]');
      setActionLoading(submitButton, true, "发送中...");
      try {
        let currentTask = buildPendingRequirementMessageTask(state.activeRequirementTask, message);
        state.activeRequirementTask = currentTask;
        state.requirementEditMode = false;
        state.requirementActiveTab = "plan";
        renderRequirementAnalysis();
        state.requirementStream = { active: true, reasoning: "", content: "", target: "plan" };
        await streamRequirement(`/api/requirement-tasks/${currentTask.id}/messages`, { message, model: state.requirementModel }, (event) => {
          if (event.type === "reasoning") {
            state.requirementStream.reasoning += event.text;
            updateRequirementStreamingView();
          } else if (event.type === "content") {
            state.requirementStream.content += event.text;
            updateRequirementStreamingView();
          } else if (event.type === "done") {
            currentTask = event.task;
          } else if (event.type === "error") {
            throw new Error(event.error);
          }
        });
        state.requirementStream = null;
        state.activeRequirementTask = currentTask;
        state.requirementTasks = state.requirementTasks.map((task) => task.id === currentTask.id ? currentTask : task);
        state.requirementActiveTab = "plan";
        state.requirementHighlightChanges = true;
        renderRequirementAnalysis();
        showToast("方案已更新并保存新版本", "success");
        ensureRequirementModelingSpec(currentTask);
      } catch (error) {
        state.requirementStream = null;
        state.activeRequirementTask = buildFailedRequirementMessageTask(state.activeRequirementTask, error.message);
        state.requirementActiveTab = "plan";
        renderRequirementAnalysis();
        showToast(`方案优化失败：${error.message}`, "error");
      } finally {
        setActionLoading(submitButton, false, "发送中...");
      }
    }

    async function saveRequirementEditedVersion() {
      const task = state.activeRequirementTask;
      const textarea = document.getElementById("requirementEditArea");
      if (!task || !textarea) {
        return;
      }
      const content = String(textarea.value || "").trim();
      if (!content) {
        showToast("内容不能为空", "error");
        return;
      }
      const target = state.requirementActiveTab === "plan" ? "plan" : "analysis";
      const button = document.getElementById("saveRequirementVersionButton");
      setActionLoading(button, true, "保存中...");
      try {
        const data = await postJson(`/api/requirement-tasks/${task.id}/versions`, { target, content });
        const updated = data.task;
        state.activeRequirementTask = updated;
        state.requirementTasks = state.requirementTasks.map((item) => item.id === updated.id ? updated : item);
        state.requirementEditMode = false;
        state.requirementHighlightChanges = false;
        renderRequirementAnalysis();
        showToast("已保存为新版本", "success");
      } catch (error) {
        showToast(`保存失败：${error.message}`, "error");
      } finally {
        setActionLoading(button, false, "保存中...");
      }
    }

    function downloadBlob(blob, fileName) {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function buildExportHtmlDocument(markdown, title) {
      const body = renderMarkdownPreview(markdown);
      return `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>${escapeHtml(title)}</title>`
        + `<style>body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;color:#1f2933;line-height:1.6;padding:24px;}`
        + `h1,h2,h3{color:#0f172a;}code{background:#f1f5f9;padding:2px 4px;border-radius:4px;}`
        + `pre{background:#f1f5f9;padding:12px;border-radius:8px;overflow:auto;}`
        + `table{border-collapse:collapse;}th,td{border:1px solid #cbd5e1;padding:6px 10px;}</style>`
        + `</head><body>${body}</body></html>`;
    }

    async function exportCurrentRequirementDocument() {
      const task = state.activeRequirementTask;
      const markdown = getRequirementExportMarkdown(task);
      const documentName = state.requirementActiveTab === "analysis" ? "解析结果" : state.requirementActiveTab === "plan" ? "实施方案" : "思考过程";
      const format = document.getElementById("requirementExportFormat")?.value || "md";

      if (format === "md") {
        downloadBlob(new Blob([markdown], { type: "text/markdown;charset=utf-8" }), `${documentName}.md`);
        showToast("Markdown 已导出", "success");
        return;
      }

      if (format === "docx") {
        if (!window.htmlDocx) {
          showToast("Word 导出组件未加载，请检查网络后重试", "error");
          return;
        }
        const html = buildExportHtmlDocument(markdown, documentName);
        downloadBlob(window.htmlDocx.asBlob(html), `${documentName}.docx`);
        showToast("Word 文档已导出", "success");
        return;
      }

      if (format === "pdf") {
        if (!window.html2pdf) {
          showToast("PDF 导出组件未加载，请检查网络后重试", "error");
          return;
        }
        const container = document.createElement("div");
        container.style.background = "#ffffff";
        container.innerHTML = buildExportHtmlDocument(markdown, documentName);
        try {
          await window.html2pdf().set({
            margin: 10,
            filename: `${documentName}.pdf`,
            image: { type: "jpeg", quality: 0.95 },
            html2canvas: { scale: 2, backgroundColor: "#ffffff" },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
          }).from(container).save();
          showToast("PDF 已导出", "success");
        } catch (error) {
          showToast(`PDF 导出失败：${error.message}`, "error");
        }
      }
    }

    function getLevelMeta(level) {

      }
      if (level === "medium" || level === "warn") {

      }
      return { dotClass: "dot-ok", badgeClass: "badge-ok", label: "跟进" };

    function renderMetrics(metrics) {
      return metrics.map((item, index) => {
        const cardClass = index === 0
          ? "metric-card metric-card-primary"
          : index === 1
            ? "metric-card metric-card-strong"
            : "metric-card metric-card-secondary";
        const valueClass = index === 0
          ? "metric-value metric-value-primary"
          : index === 1
            ? "metric-value metric-value-strong"
            : "metric-value";
        return `

    function renderTrendChart(trend) {
      const trendLineEl = document.getElementById("trendLine");
      const areaFillEl = document.getElementById("areaFill");
      const trendPointsEl = document.getElementById("trendPoints");
      const trendLabelsEl = document.getElementById("trendLabels");
      const trendGridEl = document.getElementById("trendGrid");
      const safeTrend = Array.isArray(trend) && trend.length ? trend : [{ month: "本月", value: 0 }];
      const values = safeTrend.map((item) => Number(item.value) || 0);
      const maxValue = Math.max(...values, 1);
      const stepX = 372 / Math.max(safeTrend.length - 1, 1);
      const points = safeTrend.map((item, index) => {
        const x = 24 + stepX * index;
        const y = 156 - ((Number(item.value) || 0) / maxValue) * 120;
        return { x, y, label: item.month };
      });

      const linePath = points
        .map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`)
        .join(" ");
      const areaPath = `M ${points[0].x} 156 ${points.map((point) => `L ${point.x} ${point.y}`).join(" ")} L ${points[points.length - 1].x} 156 Z`;

      trendGridEl.innerHTML = [24, 68, 112, 156]
        .map((y) => `<line x1="24" y1="${y}" x2="396" y2="${y}"></line>`)
        .join("");
      trendLineEl.setAttribute("d", linePath);
      areaFillEl.setAttribute("d", areaPath);
      trendPointsEl.innerHTML = points
        .map((point) => `<circle class="trend-point" cx="${point.x}" cy="${point.y}" r="5"></circle>`)
        .join("");
      trendLabelsEl.innerHTML = safeTrend
        .map((item) => `<span>${escapeHtml(item.month)}</span>`)
        .join("");
    }

    function openCreateProjectModal() {
      const modal = document.getElementById("createProjectModal");
      if (!modal) {
        return;
      }
      const formEl = document.getElementById("projectForm");
      formEl?.reset();
      const rootDirectoryInput = document.getElementById("rootDirectory");
      if (rootDirectoryInput) {
        rootDirectoryInput.value = "/data/projects/new-project";
        rootDirectoryInput.dataset.locked = "";
      }
      modal.classList.remove("hidden");
      document.getElementById("name")?.focus();
    }

    function closeCreateProjectModal() {
      document.getElementById("createProjectModal")?.classList.add("hidden");
    }

    function bindCreateProjectForm() {
      const formEl = document.getElementById("projectForm");
      if (!formEl || formEl.dataset.bound) {
        return;
      }
      formEl.dataset.bound = "true";

      document.getElementById("closeCreateProjectButton")?.addEventListener("click", closeCreateProjectModal);
      document.getElementById("cancelCreateProjectButton")?.addEventListener("click", closeCreateProjectModal);
      document.getElementById("createProjectModal")?.addEventListener("click", (event) => {
        if (event.target.id === "createProjectModal") {
          closeCreateProjectModal();
        }
      });

      const nameInput = document.getElementById("name");
      const rootDirectoryInput = document.getElementById("rootDirectory");

      nameInput?.addEventListener("input", () => {
        if (rootDirectoryInput && !rootDirectoryInput.dataset.locked) {
          rootDirectoryInput.value = `/data/projects/${slugifyProjectName(nameInput.value)}`;
        }
      });

      rootDirectoryInput?.addEventListener("input", () => {
        rootDirectoryInput.dataset.locked = rootDirectoryInput.value.trim() ? "true" : "";
      });

      formEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        const submitButton = formEl.querySelector('button[type="submit"]');
        setActionLoading(submitButton, true, "创建中...");

        const formData = new FormData(formEl);
        const payload = {
          name: formData.get("name"),
          customer: formData.get("customer"),
          amount: Number(formData.get("amount")),
          plannedDeliveryDate: formData.get("plannedDeliveryDate"),
          template: formData.get("template"),
          rootDirectory: formData.get("rootDirectory"),
          description: formData.get("description")
        };

        try {
          const data = await postJson("/api/projects", payload);
          showToast("项目创建成功，正在进入工作台", "success");
          closeCreateProjectModal();
          navigateTo("workspace", data.project.id, { tab: "plan" });
        } catch (error) {
          showToast(`项目创建失败：${error.message}`, "error");
        } finally {
          setActionLoading(submitButton, false, "创建中...");
        }
      });
    }

              <div>打包状态</div>
            </div>
            <div id="projectRows"></div>
          </div>
